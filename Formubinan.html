<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Ubinan</title>

<style>
*{box-sizing:border-box}
body{
  font-family:'Segoe UI',sans-serif;
  margin:0;
  background:url('https://png.pngtree.com/thumb_back/fh260/background/20240705/pngtree-view-of-rice-fields-with-green-rice-with-dew-and-mountains-image_15860694.jpg') no-repeat center center fixed;
  background-size:cover;
}

.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px 10px;
}

.card{
  max-width:760px;
  margin:auto;
  background:#fff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.header{
  text-align:center;
  margin-bottom:20px;
}
.header img{width:70px}
.header h2{
  margin:8px 0 0;
  color:#0a7d3b;
  font-size:20px;
}

.section{margin-top:20px}
.section h3{
  font-size:14px;
  margin-bottom:10px;
  color:#444;
  border-left:4px solid #0a7d3b;
  padding-left:8px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr}
}

.form-group{
  display:flex;
  flex-direction:column;
}

label{
  font-size:12px;
  font-weight:600;
  margin-bottom:4px;
}

small{
  font-size:11px;
  color:#777;
  margin-bottom:4px;
}

input,select{
  width:100%;
  padding:9px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

input:focus,select:focus{
  border-color:#0a7d3b;
  outline:none;
}

button{
  margin-top:20px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0a7d3b;
  color:#fff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}
button:hover{background:#0f9d4a}
</style>
</head>

<body>
<div class="overlay">
<div class="card">

<div class="header">
<img src="https://www.inhilkab.go.id/assets/portal/img/logos/logo-inhil-big.png">
<h2>Input Data Ubinan</h2>
</div>

<form id="formUbinan">

<div class="section">
<h3>Identitas Lokasi</h3>
<div class="grid">

<div class="form-group">
<label>Kecamatan</label>
<input type="text" id="kecamatan" required>
</div>

<div class="form-group">
<label>Desa/Kelurahan</label>
<input type="text" id="desa" required>
</div>

<div class="form-group" style="grid-column:1/-1">
<label>Poktan</label>
<input type="text" id="poktan" required>
</div>

</div>
</div>

<div class="section">
<h3>Tanaman</h3>
<div class="grid">

<div class="form-group">
<label>Jenis</label>
<select id="jenis">
<option>Padi</option>
<option>Jagung</option>
<option>Kedelai</option>
</select>
</div>

<div class="form-group">
<label>Varietas</label>
<input type="text" id="varietas" required>
</div>

</div>
</div>

<div class="section">
<h3>Data Ubinan</h3>
<div class="grid">

<div class="form-group">
<label>Luas (m²)</label>
<small>Contoh: 4 atau 5</small>
<input type="number" id="luas" required>
</div>

<div class="form-group">
<label>Jumlah Rumpun</label>
<small>Dalam 1 kotak ubinan</small>
<input type="number" id="rumpun" required>
</div>

<div class="form-group">
<label>Bulir per Tanaman</label>
<small>Rata-rata sampel</small>
<input type="number" id="bulir" required>
</div>

<div class="form-group">
<label>Timbangan (kg)</label>
<small>Berat dari 1 petak</small>
<input type="number" step="0.01" id="timbang" required>
</div>

</div>
</div>

<button type="submit">Simpan Data</button>

</form>

</div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwEYb41a103Ai2G1HUmbJzqFfrsZOhkF0vJ5NUnoxumYAneDi8yGbQNqnyinRkJCdt1/exec";

const form = document.getElementById('formUbinan');

form.addEventListener('submit', e => {
  e.preventDefault();

  const data = {
    kecamatan: document.getElementById('kecamatan').value,
    desa: document.getElementById('desa').value,
    poktan: document.getElementById('poktan').value,
    jenis: document.getElementById('jenis').value,
    varietas: document.getElementById('varietas').value,
    luas: document.getElementById('luas').value,
    rumpun: document.getElementById('rumpun').value,
    bulir: document.getElementById('bulir').value,
    timbang: document.getElementById('timbang').value
  };

  fetch(scriptURL, {
  method: 'POST',
  body: formData
})
.then(res => res.text())
.then(res => {
  console.log(res);
  alert("Data berhasil disimpan");
  form.reset();
})
.catch(err => {
  console.error(err);
  alert("Gagal kirim");
});
</script>

</body>
</html>
