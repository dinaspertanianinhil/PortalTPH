<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capaian Tanam - Dinas Pertanian Inhil</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #1b5e20;
}

body {
    margin:0;
    font-family:'Plus Jakarta Sans',sans-serif;
    background:url('https://png.pngtree.com/thumb_back/fh260/background/20240705/pngtree-view-of-rice-fields-with-green-rice-with-dew-and-mountains-image_15860694.jpg');
    background-size:cover;
}

.overlay {
    background: linear-gradient(135deg, rgba(248,250,252,0.92), rgba(240,249,245,0.88));
    min-height:100vh;
}

header {
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px 5%;
    background:rgba(255,255,255,0.9);
}

header img { width:45px; }

.container {
    padding:25px 5%;
}

.filter-box {
    margin-bottom:15px;
}

.filter-box input {
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

.cards {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.card {
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card h3 {
    font-size:0.85rem;
    color:#64748b;
    margin:0;
}

.card p {
    font-size:1.6rem;
    margin-top:10px;
    font-weight:800;
    color:var(--primary);
}

.capaian-area{
    display:flex;
    gap:15px;
}

.list-area{ flex:1; }

.chart-area{
    flex:1;
    height:380px;
    background:white;
    border-radius:12px;
    padding:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.list-frame{
    background:white;
    border-radius:12px;
    padding:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.06);
}

.item{ margin-bottom:10px; }

.item-top{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    font-weight:500;
}

.bar{
    height:8px;
    background:#e5e7eb;
    border-radius:10px;
    overflow:hidden;
    margin-top:3px;
}

.fill{ height:100%; }

@media(max-width:768px){
    .capaian-area{ flex-direction:column; }
    .chart-area{ height:280px; }
}
</style>
</head>

<body>

<div class="overlay">

<header>
    <img src="https://www.inhilkab.go.id/assets/portal/img/logos/logo-inhil-big.png">
    <div>
        <b>Bidang Tanaman Pangan dan Hortikultura</b><br>
        <small>Dinas Pertanian Kabupaten Indragiri Hilir</small>
    </div>
</header>

<div class="container">

<div class="filter-box">
    <input type="month" id="filterBulan" onchange="setMonth(this.value)">
</div>

<div class="cards">
    <div class="card">
        <h3>Total Target</h3>
        <p id="totalTarget">0</p>
    </div>
    <div class="card">
        <h3>Total Realisasi</h3>
        <p id="totalRealisasi">0</p>
    </div>
    <div class="card">
        <h3>Capaian (%)</h3>
        <p id="persenCapaian">0%</p>
    </div>
</div>

<div class="capaian-area">

    <div class="list-area">
        <div class="list-frame" id="listCapaian"></div>
    </div>

    <div class="chart-area">
        <canvas id="chartBatang"></canvas>
    </div>

</div>

</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxbJi4xJw30r7iGXd9i9cq3HAdiotpTEuVE-0k00m5wYzm2OeSfy8-rjyh3_FoaI4WS/exec";
const API_TARGET = API + "?type=target";

let realisasi = [];
let target = [];
let selectedMonth = "";
let chart;

// ===== HELPER =====
function getMonth(tgl){
    return tgl?.toString().slice(0,7) || "";
}

function safeNumber(val){
    return Number(String(val).replace(",", ".")) || 0;
}

function format2(n){
    return Number(n).toFixed(2);
}

function namaBulanToNumber(nama){
    const map = {
        "JANUARI":"01","FEBRUARI":"02","MARET":"03","APRIL":"04",
        "MEI":"05","JUNI":"06","JULI":"07","AGUSTUS":"08",
        "SEPTEMBER":"09","OKTOBER":"10","NOVEMBER":"11","DESEMBER":"12"
    };
    return map[nama?.toUpperCase()] || "";
}

// ===== LOAD =====
async function load(){
    const r1 = await fetch(API);
    const r2 = await fetch(API_TARGET);

    realisasi = await r1.json();
    target = await r2.json();

    const now = new Date().toISOString().slice(0,7);
    document.getElementById("filterBulan").value = now;
    selectedMonth = now;

    render();
}

function setMonth(val){
    selectedMonth = val;
    render();
}

function filterData(data){
    if(!selectedMonth) return data;
    return data.filter(d => getMonth(d.TANGGAL) === selectedMonth);
}

// ===== RENDER =====
function render(){

    let realMap = {};
    let targetMap = {};

    // REALISASI
    filterData(realisasi).forEach(d=>{
        const k = d.KECAMATAN.toUpperCase();
        realMap[k] = (realMap[k]||0) + safeNumber(d["LUAS TAMBAH TANAM"]);
    });

    // TARGET (SUDAH PER BULAN)
    target.forEach(d=>{
        const k = d.KECAMATAN.toUpperCase();

        let bulanData = namaBulanToNumber(d.BULAN);
        if(!bulanData) return;

        let tahunData = String(d.TAHUN);
        let gabung = tahunData + "-" + bulanData;

        if(!selectedMonth || selectedMonth === gabung){
            targetMap[k] = (targetMap[k]||0) + safeNumber(d["TARGET"]);
        }
    });

    let totalR = Object.values(realMap).reduce((a,b)=>a+b,0);
    let totalT = Object.values(targetMap).reduce((a,b)=>a+b,0);
    let persen = totalT ? totalR/totalT*100 : 0;

    document.getElementById("totalTarget").innerText = format2(totalT)+" Ha";
    document.getElementById("totalRealisasi").innerText = format2(totalR)+" Ha";

    const el = document.getElementById("persenCapaian");
    el.innerText = persen.toFixed(2)+" %";
    el.style.color = persen>=80?"#16a34a":persen>=50?"#f59e0b":"#ef4444";

    const container = document.getElementById("listCapaian");
    container.innerHTML = "";

    let labels=[], tData=[], rData=[];

    Object.keys(targetMap).forEach(k=>{

        let r = realMap[k]||0;
        let t = targetMap[k]||0;
        let p = t ? r/t*100 : 0;

        labels.push(k);
        tData.push(t);
        rData.push(r);

        let warna = p>=80?"#16a34a":p>=50?"#f59e0b":"#ef4444";

        container.innerHTML += `
        <div class="item">
            <div class="item-top">
                <span>${k}</span>
                <span>${format2(r)} / ${format2(t)} Ha (${p.toFixed(2)}%)</span>
            </div>
            <div class="bar">
                <div class="fill" style="width:${p}%; background:${warna}"></div>
            </div>
        </div>`;
    });

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chartBatang"),{
        type:'bar',
        data:{
            labels:labels,
            datasets:[
                {label:'Target', data:tData},
                {label:'Realisasi', data:rData}
            ]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            scales:{y:{beginAtZero:true}}
        }
    });
}

load();
</script>

</body>
</html>
