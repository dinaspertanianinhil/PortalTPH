<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capaian Tanam - Dinas Pertanian Inhil</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #1b5e20;
    --primary-light: #2e7d32;
    --primary-gradient: linear-gradient(135deg, #1b5e20 0%, #43a047 100%);
    --accent: #ff9800;
    --bg-glass: rgba(255, 255, 255, 0.9);
}

body {
    margin:0;
    font-family:'Plus Jakarta Sans',sans-serif;
    background:url('https://png.pngtree.com/thumb_back/fh260/background/20240705/pngtree-view-of-rice-fields-with-green-rice-with-dew-and-mountains-image_15860694.jpg');
    background-size:cover;
}

.overlay {
    background:rgba(248,250,252,0.85);
    min-height:100vh;
}

header {
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px 5%;
    background:var(--bg-glass);
}

header img { width:45px; }

.container {
    padding:25px 5%;
}

.cards {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card {
    background:white;
    padding:20px;
    border-radius:12px;
}

.card h3 {
    font-size:0.85rem;
    color:#64748b;
    margin:0;
}

.card p {
    font-size:1.8rem;
    margin-top:10px;
    font-weight:800;
    color:var(--primary);
}

.box {
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
}

.bar {
    height:18px;
    background:#e5e7eb;
    border-radius:10px;
    overflow:hidden;
}

.fill {
    height:100%;
    color:white;
    font-size:11px;
    text-align:right;
    padding-right:5px;
}
</style>
</head>

<body>

<div class="overlay">

<header>
    <img src="https://www.inhilkab.go.id/assets/portal/img/logos/logo-inhil-big.png">
    <div>
        <b>Bidang Tanaman Pangan dan Hortikultura</b><br>
        <small>Dinas Pertanian Kabupaten Indragiri Hilir</small>
    </div>
</header>

<div class="container">

<!-- CARD -->
<div class="cards">
    <div class="card">
        <h3>Total Target</h3>
        <p id="totalTarget">0</p>
    </div>
    <div class="card">
        <h3>Total Realisasi</h3>
        <p id="totalRealisasi">0</p>
    </div>
    <div class="card">
        <h3>Capaian (%)</h3>
        <p id="persenCapaian">0%</p>
    </div>
</div>

<!-- LIST -->
<div id="listCapaian"></div>

</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzN3Ak0JmBowwPePkwIIzIonYgGOEM9muR2V8ic5Z92LaqV1LriWdWlIBhNn5DA8ffT/exec";
const API_TARGET = API + "?type=target";

let realisasi = [];
let target = [];

function safeNumber(val){
    return parseFloat((val+"").replace(",", ".")) || 0;
}

async function load(){
    const r1 = await fetch(API);
    const r2 = await fetch(API_TARGET);

    realisasi = await r1.json();
    target = await r2.json();

    render();
}

function render(){

    let realMap = {};
    let targetMap = {};

    realisasi.forEach(d=>{
        const kec = (d.KECAMATAN||"").toUpperCase();
        const luas = safeNumber(d["LUAS TAMBAH TANAM"]);
        realMap[kec] = (realMap[kec]||0)+luas;
    });

    target.forEach(d=>{
        const kec = (d.KECAMATAN||"").toUpperCase();
        const t = safeNumber(d["TARGET"]);
        targetMap[kec] = (targetMap[kec]||0)+t;
    });

    let totalR = 0;
    let totalT = 0;

    Object.values(realMap).forEach(v=> totalR += v);
    Object.values(targetMap).forEach(v=> totalT += v);

    const persen = totalT ? (totalR/totalT*100) : 0;

    document.getElementById("totalTarget").innerText = totalT.toFixed(0) + " Ha";
    document.getElementById("totalRealisasi").innerText = totalR.toFixed(0) + " Ha";

    const persenEl = document.getElementById("persenCapaian");
    persenEl.innerText = persen.toFixed(2) + " %";

    let warna = "#ef4444";
    if(persen>=80) warna="#16a34a";
    else if(persen>=50) warna="#f59e0b";

    persenEl.style.color = warna;

    // LIST PER KECAMATAN
    const container = document.getElementById("listCapaian");
    container.innerHTML = "";

    Object.keys(targetMap).forEach(kec=>{

        const r = realMap[kec] || 0;
        const t = targetMap[kec] || 0;
        const p = t ? (r/t*100) : 0;

        let warna = "#ef4444";
        if(p>=80) warna="#16a34a";
        else if(p>=50) warna="#f59e0b";

        const div = document.createElement("div");
        div.className = "box";

        div.innerHTML = `
            <b>${kec}</b>
            <p>${r.toFixed(1)} / ${t.toFixed(1)} Ha (${p.toFixed(1)}%)</p>
            <div class="bar">
                <div class="fill" style="width:${p}%; background:${warna}">
                    ${p.toFixed(0)}%
                </div>
            </div>
        `;

        container.appendChild(div);

    });
}

load();
</script>

</body>
</html>
