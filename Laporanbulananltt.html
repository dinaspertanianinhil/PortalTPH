<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maintenance Dashboard</title>

<style>
body{
  margin:0;
  font-family:Segoe UI,Arial;
  background-image:url('https://png.pngtree.com/thumb_back/fh260/background/20240705/pngtree-view-of-rice-fields-with-green-rice-with-dew-and-mountains-image_15860694.jpg');
  background-size:cover;
  background-attachment:fixed;
}

.overlay{
  background:rgba(255,255,255,0.92);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER tetap sama vibe */
header{
  display:flex;
  align-items:center;
  gap:15px;
  padding:15px 25px;
  background:#1b5e20;
  color:white;
}

header img{ width:55px; }

/* CENTER CONTENT */
.maintenance-box{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.card{
  background:white;
  padding:40px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  max-width:500px;
  width:100%;
  animation:fadeIn 0.8s ease;
}

.icon{
  font-size:60px;
  margin-bottom:15px;
}

h2{
  margin:10px 0;
  color:#1b5e20;
}

p{
  color:#555;
  line-height:1.6;
}

button{
  margin-top:20px;
  padding:10px 16px;
  border:none;
  background:#2e7d32;
  color:white;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1b5e20;
}

/* animasi biar hidup */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* spinner simple */
.loader{
  margin:20px auto;
  border:5px solid #eee;
  border-top:5px solid #2e7d32;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

footer{
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#777;
}
</style>
</head>

<body>
<div class="overlay">

<header>
<img src="https://www.inhilkab.go.id/assets/portal/img/logos/logo-inhil-big.png">
<h1>
Bidang Tanaman Pangan dan Hortikultura<br>
</h1>
</header>

<div class="maintenance-box">
  <div class="card">

    <div class="icon">🛠️</div>

    <h2>Dashboard Sedang Maintenance</h2>

    <div class="loader"></div>

    <p>
      Sistem sedang dalam proses peningkatan performa dan perbaikan layanan.<br>
      Mohon bersabar, kami sedang memastikan semuanya berjalan lebih baik dari sebelumnya.
    </p>

    <button onclick="location.reload()">Refresh Halaman</button>

  </div>
</div>

<footer>
  © 2026 Bidang Tanaman Pangan dan Hortikultura
</footer>

</div>
</body>
</html>
