<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maintenance - Hortikultura</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,system-ui,sans-serif
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.9)),
url("https://voxntt.com/wp-content/uploads/2018/07/sayur-dan-buah-sehat.jpg") center/cover no-repeat;

color:white;
}

/* ===== BACKGROUND ANIMATION ===== */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%, rgba(39,174,96,.15), transparent),
radial-gradient(circle at 80% 70%, rgba(255,255,255,.08), transparent);
animation:bgMove 12s linear infinite;
}

@keyframes bgMove{
0%{transform:translate(0,0)}
50%{transform:translate(-5%, -5%)}
100%{transform:translate(0,0)}
}

/* ===== CARD ===== */

.card{
position:relative;
text-align:center;
padding:45px 35px;
border-radius:20px;

background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.2);

box-shadow:0 40px 100px rgba(0,0,0,.7);

max-width:450px;
width:90%;

animation:fadeUp 1s ease;
}

/* GLOW EFFECT */
.card::after{
content:"";
position:absolute;
inset:0;
border-radius:20px;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.08),transparent);
pointer-events:none;
}

/* ===== ICON ===== */

.icon{
font-size:65px;
margin-bottom:15px;
animation:float 3s ease-in-out infinite, glow 2s infinite alternate;
}

/* ===== TEXT ===== */

h1{
font-size:22px;
margin-bottom:10px;
letter-spacing:.5px;
}

p{
font-size:14px;
opacity:.9;
line-height:1.6;
}

/* ===== PROGRESS BAR ===== */

.progress{
margin-top:20px;
height:6px;
background:rgba(255,255,255,.2);
border-radius:10px;
overflow:hidden;
}

.progress span{
display:block;
height:100%;
width:40%;
background:#27ae60;
animation:load 2s infinite;
border-radius:10px;
}

@keyframes load{
0%{margin-left:-40%}
100%{margin-left:100%}
}

/* ===== DOT LOADING ===== */

.dots{
margin-top:10px;
font-size:22px;
letter-spacing:5px;
}

.dots span{
animation:blink 1.4s infinite;
}

.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}

/* ===== BUTTON ===== */

button{
margin-top:25px;
padding:10px 20px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#27ae60,#2ecc71);
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 15px 25px rgba(0,0,0,.5);
}

/* ===== ANIMATION ===== */

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

@keyframes glow{
from{text-shadow:0 0 10px rgba(39,174,96,.4)}
to{text-shadow:0 0 20px rgba(39,174,96,.9)}
}

@keyframes blink{
0%,80%,100%{opacity:0}
40%{opacity:1}
}

/* ===== FOOTER TEXT ===== */

.footer{
margin-top:15px;
font-size:12px;
opacity:.6;
}

/* RESPONSIVE */

@media(max-width:500px){
h1{font-size:18px}
p{font-size:13px}
.icon{font-size:55px}
}

</style>
</head>

<body>

<div class="card">

<div class="icon">🌱</div>

<h1>Dashboard Hortikultura Sedang Dalam Pengembangan</h1>

<p>
Sistem dashboard harga hortikultura sedang dilakukan peningkatan performa dan integrasi data.
Kami sedang memastikan data yang ditampilkan lebih akurat dan real-time.
</p>

<div class="progress">
<span></span>
</div>

<div class="dots">
<span>.</span><span>.</span><span>.</span>
</div>



<div class="footer">
Sistem Informasi Pertanian • Dinas Pertanian Inhil
</div>

</div>

</body>
</html>
