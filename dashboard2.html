<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Guest – Sistem Laporan Dinas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)),
        url("https://assets.promediateknologi.id/crop/0x0:0x0/0x0/webp/photo/p3/155/2025/04/10/Screen-Shot-2025-04-10-at-224530-3222523999.png")
        no-repeat center / cover;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: #fff;
    }

    header {
      background: rgba(0,0,0,0.45);
      padding: 20px 10px;
      text-align: center;
      font-size: 1.15em;
      font-weight: 700;
      letter-spacing: 0.4px;
      backdrop-filter: blur(6px);
    }

    header small {
      display: block;
      font-size: 0.82em;
      font-weight: 400;
      opacity: 0.9;
      margin-top: 3px;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 15px;
    }

    .card {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
      padding: 45px 40px;
      border-radius: 22px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      animation: fade 0.6s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      font-size: 1.55em;
      margin-bottom: 12px;
      font-weight: 700;
      color: #fff;
    }

    p {
      font-size: 0.95em;
      margin-bottom: 28px;
      opacity: 0.92;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #1c8a58;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.25s ease;
      margin-top: 10px;
    }

    button:hover {
      background: #23a76a;
      transform: translateY(-2px);
    }

    .logoutBtn {
      background: #e12f2f;
    }

    .logoutBtn:hover {
      background: #ff4b4b;
    }

    footer {
      text-align: center;
      font-size: 0.82em;
      padding: 12px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <header>
    DASHBOARD GUEST
    <small>Akses Data Stok • Produksi • Harga</small>
  </header>

  <main>
    <div class="card">
      <h2>📊 Pilih Data yang Ingin Dilihat</h2>
      <p>Anda login sebagai Guest</p>

      <button onclick="location.href='tampil.html'">Lihat Produksi Beras</button>
      <button onclick="location.href='Tampilhorti.html'">Lihat Data Hortikultura</button>
      <button onclick="location.href='Tampilltt.html'">Lihat Data Luas Tambah Tanam (LTT)</button>
      <button onclick="location.href='tampilopt.html'">Lihat Data Serangan Hama (LTT)</button>
      <button class="logoutBtn" onclick="logout()">Logout</button>
    </div>
  </main>

  <footer>
    © 2025 Dinas Pertanian – Kabupaten Indragiri Hilir
  </footer>

  <script>
    function logout() {
      localStorage.removeItem("loginUser");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
