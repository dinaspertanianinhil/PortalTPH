<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laporan LTT</title>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root{
    --green-dark:#0b5d3b;
    --green:#198754;
    --green-light:#20c997;
    --white:#ffffff;
    --soft:#f4fff7;
    --shadow:0 10px 25px rgba(0,0,0,0.12);
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:url('https://png.pngtree.com/thumb_back/fh260/background/20240705/pngtree-view-of-rice-fields-with-green-rice-with-dew-and-mountains-image_15860694.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:#1f2937;
    overflow-x:hidden;
}

.overlay{
    min-height:100vh;
    background:rgba(255,255,255,0.72);
    backdrop-filter:blur(3px);
}

/* HEADER */
header{
    position:sticky;
    top:0;
    z-index:999;
    background:linear-gradient(135deg,var(--green-dark),var(--green));
    padding:18px 24px;
    box-shadow:var(--shadow);
}

.header-content{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.header-left{
    display:flex;
    align-items:center;
    gap:18px;
}

.logo{
    width:58px;
    animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-5px);
    }
}

/* TITLE */
.title-wrap{
    display:flex;
    align-items:center;
    gap:10px;
}

.hand{
    font-size:38px;
    animation:moveHand 0.7s infinite alternate;
}

@keyframes moveHand{
    from{
        transform:translateX(0px);
    }
    to{
        transform:translateX(12px);
    }
}

.title-text h1{
    color:white;
    font-size:2rem;
    font-weight:800;
    letter-spacing:1px;
}

.title-text p{
    color:rgba(255,255,255,0.9);
    font-size:0.92rem;
}

#current-date{
    color:white;
    opacity:0.9;
    font-size:0.9rem;
}

/* CONTAINER */
.container{
    max-width:1300px;
    margin:auto;
    padding:28px 20px;
}

/* FILTER */
.filter-card{
    background:rgba(255,255,255,0.92);
    border-radius:24px;
    padding:24px;
    box-shadow:var(--shadow);
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-bottom:30px;
}

.filter-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.filter-group label{
    font-size:0.85rem;
    font-weight:700;
    color:#374151;
}

.filter-group input,
.filter-group select{
    padding:14px;
    border-radius:14px;
    border:none;
    background:#f8fafc;
    box-shadow:inset 0 0 0 1px #dbe4ec;
    font-size:0.95rem;
}

.filter-group input:focus,
.filter-group select:focus{
    outline:none;
    box-shadow:0 0 0 3px rgba(25,135,84,0.25);
}

/* BUTTON */
.btn{
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,var(--green),var(--green-light));
    color:white;
    font-weight:700;
    cursor:pointer;
    padding:14px;
    transition:0.3s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top:24px;
}

.btn:hover{
    transform:translateY(-2px);
}

/* STATS */
.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
    margin-bottom:35px;
}

.stat-card{
    background:rgba(255,255,255,0.93);
    border-radius:24px;
    padding:24px;
    box-shadow:var(--shadow);
    display:flex;
    align-items:center;
    gap:18px;
    transition:0.3s;
}

.stat-card:hover{
    transform:translateY(-4px);
}

.icon-box{
    width:65px;
    height:65px;
    border-radius:18px;
    background:linear-gradient(135deg,#d1fae5,#bbf7d0);
    display:flex;
    align-items:center;
    justify-content:center;
}

.stat-info p{
    font-size:0.92rem;
    color:#6b7280;
}

.stat-info h2{
    color:var(--green-dark);
    font-size:1.6rem;
}

/* SECTION */
.section-title{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
    color:var(--green-dark);
}

.section-title h3{
    font-size:1.3rem;
}

/* TABLE */
.table-container{
    background:rgba(255,255,255,0.94);
    border-radius:24px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:35px;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:700px;
}

thead{
    background:linear-gradient(135deg,var(--green-dark),var(--green));
    color:white;
}

thead th{
    padding:18px;
    text-align:center;
    font-size:0.92rem;
}

tbody td{
    padding:16px;
    border-bottom:1px solid #ecf0f3;
    text-align:right;
    font-size:0.92rem;
}

tbody td:first-child{
    text-align:left;
    font-weight:600;
}

tbody tr:hover{
    background:#f0fff4;
}

.total-row{
    background:#d1fae5;
    font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){

    body{
        background-attachment:scroll;
    }

    .header-content{
        justify-content:center;
        text-align:center;
    }

    .header-left{
        flex-direction:column;
    }

    .title-wrap{
        flex-direction:column;
    }

    .title-text h1{
        font-size:1.6rem;
    }

    .container{
        padding:20px 12px;
    }
}

</style>
</head>

<body>

<div class="overlay">

<header>

    <div class="header-content">

        <div class="header-left">

            <img
            class="logo"
            src="https://www.inhilkab.go.id/assets/portal/img/logos/logo-inhil-big.png"
            alt="Logo">

            <div class="title-wrap">

                <div class="hand">👉</div>

                <div class="title-text">
                    <h1>LAPORAN LTT</h1>
                    <p>Dinas Pertanian Kabupaten Indragiri Hilir</p>
                </div>

            </div>

        </div>

        <div id="current-date"></div>

    </div>

</header>

<div class="container">

    <!-- FILTER -->
    <div class="filter-card">

        <div class="filter-group">
            <label>Pilih Bulan & Tahun</label>
            <input type="month" id="bulan">
        </div>

        <div class="filter-group">
            <label>Kecamatan</label>
            <select id="kecamatan">
                <option value="">Semua Kecamatan</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Desa / Kelurahan</label>
            <select id="desa">
                <option value="">Semua Desa</option>
            </select>
        </div>

        <button class="btn" onclick="render()">
            <i data-lucide="search"></i>
            Tampilkan Data
        </button>

    </div>

    <!-- STATS -->
    <div class="stats-grid">

        <div class="stat-card">

            <div class="icon-box">
                <i data-lucide="sprout"></i>
            </div>

            <div class="stat-info">
                <p>Total Luas Tambah Tanam</p>
                <h2 id="total-ltt">0.00</h2>
            </div>

        </div>

        <div class="stat-card">

            <div class="icon-box">
                <i data-lucide="map"></i>
            </div>

            <div class="stat-info">
                <p>Jumlah Lokasi</p>
                <h2 id="total-lokasi">0</h2>
            </div>

        </div>

        <div class="stat-card">

            <div class="icon-box">
                <i data-lucide="calendar"></i>
            </div>

            <div class="stat-info">
                <p>Periode</p>
                <h2 id="periode-text">-</h2>
            </div>

        </div>

    </div>

    <!-- TABEL KECAMATAN -->
    <div class="section-title">
        <i data-lucide="layers"></i>
        <h3>Rekapitulasi Per Kecamatan</h3>
    </div>

    <div class="table-container">

        <table id="tabelKecamatan">

            <thead>
                <tr>
                    <th>Kecamatan</th>
                    <th>Oplah</th>
                    <th>Reguler</th>
                </tr>
            </thead>

            <tbody></tbody>

        </table>

    </div>

    <!-- TABEL DESA -->
    <div class="section-title">
        <i data-lucide="map-pin"></i>
        <h3>Rekapitulasi Per Desa / Kelurahan</h3>
    </div>

    <div class="table-container">

        <table id="tabelDesa">

            <thead>
                <tr>
                    <th>Desa / Kelurahan</th>
                    <th>Oplah</th>
                    <th>Reguler</th>
                </tr>
            </thead>

            <tbody></tbody>

        </table>

    </div>

</div>
</div>

<script>

lucide.createIcons();

/* TANGGAL */
const options = {
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
};

document.getElementById('current-date').innerText =
new Date().toLocaleDateString('id-ID', options);

/* API */
const API =
"https://script.google.com/macros/s/AKfycbz9BbxHtegnOrlIdwMBjsRRfK1weywnjIXnbX4YgGY-F6egmvMFUO3pqZ5CAXg99ac/exec";

let raw = [];

/* FORMAT ANGKA */
function num(x){
    return parseFloat((x + "").replace(",", ".")) || 0;
}

/* LOAD DATA */
async function load(){

    try{

        let r = await fetch(API);

        raw = await r.json();

        let kecSet = new Set();
        let desaSet = new Set();

        raw.forEach(d => {

            if(d.KECAMATAN)
                kecSet.add(d.KECAMATAN);

            if(d["DESA/KELURAHAN"])
                desaSet.add(d["DESA/KELURAHAN"]);

        });

        const kecamatan =
        document.getElementById('kecamatan');

        const desa =
        document.getElementById('desa');

        [...kecSet].sort().forEach(k => {
            kecamatan.innerHTML +=
            `<option value="${k}">${k}</option>`;
        });

        [...desaSet].sort().forEach(d => {
            desa.innerHTML +=
            `<option value="${d}">${d}</option>`;
        });

        /* SET BULAN SEKARANG */
        const now = new Date();

        const month =
        String(now.getMonth()+1).padStart(2,'0');

        document.getElementById('bulan').value =
        `${now.getFullYear()}-${month}`;

        render();

    }catch(err){

        console.error(err);

        alert("Gagal mengambil data.");

    }
}

/* RENDER */
function render(){

    let b =
    document.getElementById('bulan').value;

    let k =
    document.getElementById('kecamatan').value;

    let d =
    document.getElementById('desa').value;

    /* PERIODE */
    if(b){

        const dateObj = new Date(b + "-01");

        document.getElementById('periode-text').innerText =
        dateObj.toLocaleDateString('id-ID',{
            month:'long',
            year:'numeric'
        });

    }

    /* FILTER */
    let data = raw.filter(x => {

        if(b && !x.TANGGAL.startsWith(b))
            return false;

        if(k && x.KECAMATAN !== k)
            return false;

        if(d && x["DESA/KELURAHAN"] !== d)
            return false;

        return true;

    });

    /* JENIS */
    let jenisSet = new Set();

    data.forEach(x => {

        if(x["JENIS LTT"])
            jenisSet.add(x["JENIS LTT"]);

    });

    let jenisList = [...jenisSet];

    /* ======================
       REKAP KECAMATAN
    ====================== */

    let kecMap = {};
    let grandTotal = 0;

    data.forEach(x => {

        let kc = x.KECAMATAN;
        let jenis = x["JENIS LTT"];
        let luas = num(x["LUAS TAMBAH TANAM"]);

        grandTotal += luas;

        if(!kecMap[kc])
            kecMap[kc] = {};

        kecMap[kc][jenis] =
        (kecMap[kc][jenis] || 0) + luas;

    });

    document.getElementById('total-ltt').innerText =
    grandTotal.toLocaleString('id-ID',{
        minimumFractionDigits:2
    });

    /* HEADER */
    let head =
    `<tr><th>Kecamatan</th>`;

    jenisList.forEach(j => {

        head += `<th>${j}</th>`;

    });

    head += `</tr>`;

    document.getElementById('tabelKecamatan')
    .querySelector('thead').innerHTML = head;

    /* BODY */
    let body = "";
    let totalKolom = {};

    Object.keys(kecMap).sort().forEach(kc => {

        let row = `<tr><td>${kc}</td>`;

        jenisList.forEach(j => {

            let val =
            kecMap[kc][j] || 0;

            totalKolom[j] =
            (totalKolom[j] || 0) + val;

            row += `
            <td>
                ${val.toLocaleString('id-ID',{
                    minimumFractionDigits:2
                })}
            </td>`;

        });

        row += `</tr>`;

        body += row;

    });

    /* TOTAL */
    let totalRow =
    `<tr class="total-row"><td>TOTAL</td>`;

    jenisList.forEach(j => {

        totalRow += `
        <td>
            ${(totalKolom[j] || 0)
            .toLocaleString('id-ID',{
                minimumFractionDigits:2
            })}
        </td>`;

    });

    totalRow += `</tr>`;

    document.getElementById('tabelKecamatan')
    .querySelector('tbody').innerHTML =
    body + totalRow;

    /* ======================
       REKAP DESA
    ====================== */

    let desaMap = {};
    let desaCount = new Set();

    data.forEach(x => {

        let ds =
        x["DESA/KELURAHAN"];

        let jenis =
        x["JENIS LTT"];

        let luas =
        num(x["LUAS TAMBAH TANAM"]);

        desaCount.add(ds);

        if(!desaMap[ds])
            desaMap[ds] = {};

        desaMap[ds][jenis] =
        (desaMap[ds][jenis] || 0) + luas;

    });

    document.getElementById('total-lokasi').innerText =
    desaCount.size;

    /* HEADER DESA */
    let head2 =
    `<tr><th>Desa / Kelurahan</th>`;

    jenisList.forEach(j => {

        head2 += `<th>${j}</th>`;

    });

    head2 += `</tr>`;

    document.getElementById('tabelDesa')
    .querySelector('thead').innerHTML = head2;

    /* BODY DESA */
    let body2 = "";
    let totalKolom2 = {};

    Object.keys(desaMap).sort().forEach(ds => {

        let row = `<tr><td>${ds}</td>`;

        jenisList.forEach(j => {

            let val =
            desaMap[ds][j] || 0;

            totalKolom2[j] =
            (totalKolom2[j] || 0) + val;

            row += `
            <td>
                ${val.toLocaleString('id-ID',{
                    minimumFractionDigits:2
                })}
            </td>`;

        });

        row += `</tr>`;

        body2 += row;

    });

    /* TOTAL */
    let totalRow2 =
    `<tr class="total-row"><td>TOTAL</td>`;

    jenisList.forEach(j => {

        totalRow2 += `
        <td>
            ${(totalKolom2[j] || 0)
            .toLocaleString('id-ID',{
                minimumFractionDigits:2
            })}
        </td>`;

    });

    totalRow2 += `</tr>`;

    document.getElementById('tabelDesa')
    .querySelector('tbody').innerHTML =
    body2 + totalRow2;
}

/* LOAD */
load();

</script>

</body>
</html>
