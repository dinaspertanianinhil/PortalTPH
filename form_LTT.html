<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Maintenance Sistem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* BOX UTAMA */
.container {
  background:#ffffff;
  padding:30px 24px;
  border-radius:12px;
  text-align:center;
  max-width:400px;
  width:90%;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
}

/* LOGO */
.logo {
  width:70px;
  margin-bottom:16px;
}

/* TITLE */
.title {
  font-size:18px;
  font-weight:600;
  margin-bottom:6px;
}

/* SUBTITLE */
.subtitle {
  font-size:14px;
  color:#6b7280;
  margin-bottom:20px;
}

/* ICON */
.icon {
  font-size:40px;
  margin-bottom:10px;
}

/* TEXT */
.text {
  font-size:14px;
  color:#374151;
  margin-bottom:20px;
}

/* FOOTER */
.footer {
  font-size:12px;
  color:#9ca3af;
}

/* BUTTON */
button {
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#0f766e;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button:hover {
  opacity:.9;
}
</style>
</head>

<body>

<div class="container">
  
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/a/a3/Logo_kabupaten_indragiri_hilir.jpg">

  <div class="title">Sistem Pelaporan LTT</div>
  <div class="subtitle">Dinas Pertanian Kabupaten Indragiri Hilir</div>

  <div class="icon">🛠️</div>

  <div class="text">
    Halaman input sedang dalam proses <b>maintenance</b>.<br><br>
    Kami sedang melakukan peningkatan sistem agar layanan lebih optimal, stabil, dan cepat.
  </div>

  <button onclick="location.reload()">login kembali jam 10.30</button>

  <div class="footer" style="margin-top:16px;">
    Mohon maaf atas ketidaknyamanan ini 🙏<br>
    Silakan kembali beberapa saat lagi
  </div>

</div>

</body>
</html>
