<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Data Stok & Harga</title>

<style>

body{
font-family:"Segoe UI",sans-serif;
background:url("https://assets.promediateknologi.id/crop/0x0:0x0/0x0/webp/photo/p3/155/2025/04/10/Screen-Shot-2025-04-10-at-224530-3222523999.png") no-repeat center center fixed;
background-size:cover;
margin:0;
padding:20px;
}

header{
background:linear-gradient(135deg,#1b4332,#2d6a4f);
color:white;
padding:18px;
text-align:center;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 6px 12px rgba(0,0,0,0.25);
}

header h2{margin:0;}

.dashboard-info{
margin-top:8px;
font-size:13px;
opacity:.9;
}

.content{
background:rgba(255,255,255,0.93);
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.filter-container{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

select,input{
padding:8px 10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
background:white;
}

input[type="text"]{width:200px;}

.action-bar{
display:flex;
justify-content:flex-end;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
}

button{
background:#2d6a4f;
color:white;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
font-size:13px;
font-weight:600;
}

button:hover{background:#1b4332;}

.btn-danger{background:#d9534f;}

.table-frame{
width:100%;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
font-size:13px;
text-align:left;
max-width:150px;
}

th{
background:#2d6a4f;
color:white;
text-align:center;
}

tr:nth-child(even){background:#f3f6f4;}

.total-box{
margin-top:15px;
font-weight:600;
font-size:14px;
color:#1b4332;
background:#e9f5ee;
border:1px solid #b7dfc4;
padding:10px;
border-radius:6px;
width:fit-content;
}

.data-count{
margin-top:8px;
font-size:13px;
color:#555;
}

.loading{
text-align:center;
padding:30px;
font-size:15px;
}

@media print{
.filter-container,.action-bar{display:none;}
}

</style>
</head>

<body>

<header>
<h2>📊 Dashboard Laporan Stok & Harga Gabah & Beras</h2>
<div class="dashboard-info">
Sistem Monitoring Produksi dan Stok Penggilingan
</div>
</header>

<div class="content">

<div class="filter-container">

<select id="filterBulan">
<option value="">🗓️ Semua Bulan</option>
</select>

<select id="filterPenggilingan">
<option value="">🏭 Semua Penggilingan</option>
</select>

<input type="date" id="filterTanggal">

<input type="text" id="search" placeholder="🔍 Cari data...">

</div>

<div class="action-bar">
<button onclick="printTable()">🖨️ Print</button>
<button onclick="downloadExcel()">⬇️ Excel</button>
<button onclick="downloadPDF()">📄 PDF</button>
</div>

<div id="data-container" class="loading">Memuat data...</div>

<div id="data-count" class="data-count"></div>

<div id="total-container" class="total-box"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<script>

const url="https://script.google.com/macros/s/AKfycbxrEF7plzQoncqgCN_ShlIR_wzdsfRc6zfpYJaoulU8IGvCrngrbAqTfcUUbLc7d6jqDg/exec";

let allData=[];

async function loadData(){

const res=await fetch(url);
const data=await res.json();

allData=data;

populateFilters(data);
renderTable();

}

function getNamaBulan(dateStr){

const bulan=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

const d=new Date(dateStr);

if(isNaN(d))return"Tidak diketahui";

return bulan[d.getMonth()]+" "+d.getFullYear();

}

function populateFilters(data){

const rows=data.slice(1);

const bulanSet=new Set();
const penggilinganSet=new Set();

rows.forEach(r=>{
bulanSet.add(getNamaBulan(r[0]));
penggilinganSet.add(r[1]);
});

bulanSet.forEach(b=>{
document.getElementById("filterBulan").innerHTML+=`<option value="${b}">${b}</option>`;
});

penggilinganSet.forEach(p=>{
document.getElementById("filterPenggilingan").innerHTML+=`<option value="${p}">${p}</option>`;
});

}

function getFilteredRows(){

const rows=allData.slice(1);

const searchValue=document.getElementById("search").value.toLowerCase();
const selectedBulan=document.getElementById("filterBulan").value;
const selectedPenggilingan=document.getElementById("filterPenggilingan").value;
const selectedTanggal=document.getElementById("filterTanggal").value;

return rows.filter(row=>{

const bulan=getNamaBulan(row[0]);
const tanggal=row[0]?.split("T")[0];

const cocokBulan=!selectedBulan||bulan===selectedBulan;
const cocokPenggilingan=!selectedPenggilingan||row[1]===selectedPenggilingan;
const cocokTanggal=!selectedTanggal||tanggal===selectedTanggal;
const cocokSearch=row.join(" ").toLowerCase().includes(searchValue);

return cocokBulan&&cocokPenggilingan&&cocokTanggal&&cocokSearch;

});

}

function sumUnique(rows,index){

const seen=new Set();
let total=0;

rows.forEach(r=>{
const val=Number(r[index])||0;
if(seen.has(val))return;
seen.add(val);
total+=val;
});

return total;

}

function renderTable(){

if(allData.length===0)return;

const header=allData[0];
const rows=getFilteredRows();

let html=`<div class="table-frame"><table><tr>${header.map(h=>`<th>${h}</th>`).join("")}<th>Aksi</th></tr>`;

rows.forEach((row,i)=>{
html+="<tr>";
row.forEach(cell=>html+=`<td>${cell}</td>`);
html+=`<td><button class="btn-danger" onclick="hapusData(${i+2})">Hapus</button></td></tr>`;
});

html+="</table></div>";

document.getElementById("data-container").innerHTML=html;

document.getElementById("data-count").innerHTML="Jumlah Data Ditampilkan : "+rows.length;

const totalProduksi=sumUnique(rows,17);

document.getElementById("total-container").innerHTML=
`Total Produksi Beras : ${(totalProduksi/1000).toFixed(2)} Ton`;

}

function printTable(){window.print();}

function downloadExcel(){

const rows=getFilteredRows();
const header=allData[0];

const ws=XLSX.utils.aoa_to_sheet([header,...rows]);
const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Laporan");

XLSX.writeFile(wb,"Laporan_Stok_Harga.xlsx");

}

function downloadPDF(){

const {jsPDF}=window.jspdf;

const doc=new jsPDF('l','mm','legal');

const header=allData[0];
const rows=getFilteredRows();

const tanggalCetak=new Date().toLocaleDateString("id-ID");

doc.setFontSize(16);
doc.text("LAPORAN STOK DAN HARGA GABAH BERAS",14,15);

doc.setFontSize(10);
doc.text("Tanggal Cetak : "+tanggalCetak,14,22);

const filterBulan=document.getElementById("filterBulan").value||"Semua";
const filterPenggilingan=document.getElementById("filterPenggilingan").value||"Semua";
const filterTanggal=document.getElementById("filterTanggal").value||"Semua";

doc.text("Filter Bulan : "+filterBulan,14,28);
doc.text("Filter Penggilingan : "+filterPenggilingan,14,34);
doc.text("Filter Tanggal : "+filterTanggal,14,40);

doc.autoTable({
head:[header],
body:rows,
startY:45,
styles:{fontSize:8},
theme:'grid'
});

doc.save("Laporan_Stok_Harga.pdf");

}

document.getElementById("filterBulan").addEventListener("change",renderTable);
document.getElementById("filterPenggilingan").addEventListener("change",renderTable);
document.getElementById("filterTanggal").addEventListener("change",renderTable);
document.getElementById("search").addEventListener("input",renderTable);

loadData();

</script>

</body>
</html>
