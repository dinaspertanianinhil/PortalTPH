<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Data Stok & Harga</title>

<style>

body{
font-family:"Segoe UI",sans-serif;
background:url("https://assets.promediateknologi.id/crop/0x0:0x0/0x0/webp/photo/p3/155/2025/04/10/Screen-Shot-2025-04-10-at-224530-3222523999.png") no-repeat center center fixed;
background-size:cover;
margin:0;
padding:20px;
animation:fadeBody 1s ease;
}

@keyframes fadeBody{
from{opacity:0}
to{opacity:1}
}

header{
background:linear-gradient(135deg,#1b4332,#2d6a4f);
color:white;
padding:18px;
text-align:center;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 6px 12px rgba(0,0,0,0.25);
}

header h2{
margin:0;
font-weight:600;
letter-spacing:.5px;
}

.dashboard-info{
margin-top:8px;
font-size:13px;
opacity:.9;
}

.content{
background:rgba(255,255,255,0.93);
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
backdrop-filter:blur(4px);
}

.filter-container{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

select,input[type="text"]{
padding:8px 10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
background:white;
transition:.2s;
}

input[type="text"]{width:200px;}

.action-bar{
display:flex;
justify-content:flex-end;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
}

button,.btn-action{
background:#2d6a4f;
color:white;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
font-size:13px;
font-weight:600;
transition:.25s;
}

button:hover,.btn-action:hover{
background:#1b4332;
}

.btn-danger{
background:#d9534f;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
font-size:13px;
text-align:left;
max-width:150px;
word-wrap:break-word;
}

th{
background:#2d6a4f;
color:white;
text-align:center;
}

tr:nth-child(even){
background:#f3f6f4;
}

tr:hover{
background:#e6f4ec;
}

/* FRAME SCROLL TABEL */

.table-frame{
width:100%;
overflow-x:auto;
border-radius:8px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

.total-box{
margin-top:15px;
font-weight:600;
font-size:14px;
color:#1b4332;
background:#e9f5ee;
border:1px solid #b7dfc4;
padding:10px;
border-radius:6px;
width:fit-content;
}

.data-count{
margin-top:8px;
font-size:13px;
color:#555;
}

.loading{
text-align:center;
padding:30px;
font-size:15px;
color:#666;
}

.spinner{
border:4px solid #eee;
border-top:4px solid #2d6a4f;
border-radius:50%;
width:35px;
height:35px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

@media print{

@page{
size:legal landscape;
margin:10mm;
}

.filter-container,
.action-bar,
button{
display:none;
}

body{
background:none;
}

.content{
box-shadow:none;
}

table{
font-size:11px;
}

}

</style>
</head>

<body>

<header>
<h2>📊 Dashboard Laporan Stok & Harga Gabah & Beras</h2>
<div class="dashboard-info">
Sistem Monitoring Produksi dan Stok Penggilingan
</div>
</header>

<div class="content">

<div class="filter-container">
<select id="filterBulan">
<option value="">🗓️ Semua Bulan</option>
</select>

<select id="filterPenggilingan">
<option value="">🏭 Semua Penggilingan</option>
</select>

<input type="text" id="search" placeholder="🔍 Cari data...">
</div>

<div class="action-bar">
<button onclick="printTable()">🖨️ Print</button>
<button onclick="downloadExcel()">⬇️ Excel</button>
<button onclick="downloadPDF()">📄 PDF</button>
</div>

<div id="data-container" class="loading">
<div class="spinner"></div>
<p>Memuat data...</p>
</div>

<div id="data-count" class="data-count"></div>

<div id="total-container" class="total-box"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<script>

const url="https://script.google.com/macros/s/AKfycbxrEF7plzQoncqgCN_ShlIR_wzdsfRc6zfpYJaoulU8IGvCrngrbAqTfcUUbLc7d6jqDg/exec";

let allData=[];

async function loadData(){

try{

const res=await fetch(url);
const data=await res.json();

allData=data;

populateFilters(data);
renderTable();

}catch(err){

document.getElementById("data-container").innerHTML=
"<p style='color:red'>❌ Gagal memuat data</p>";

}

}

function getNamaBulan(dateStr){

const bulan=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

const d=new Date(dateStr);

if(isNaN(d))return"Tidak diketahui";

return bulan[d.getMonth()]+" "+d.getFullYear();

}

function populateFilters(data){

const rows=data.slice(1);

const bulanSet=new Set();
const penggilinganSet=new Set();

rows.forEach(r=>{
bulanSet.add(getNamaBulan(r[0]));
penggilinganSet.add(r[1]);
});

const bulanSelect=document.getElementById("filterBulan");

bulanSet.forEach(b=>{
bulanSelect.innerHTML+=`<option value="${b}">${b}</option>`;
});

const penggSelect=document.getElementById("filterPenggilingan");

penggilinganSet.forEach(p=>{
penggSelect.innerHTML+=`<option value="${p}">${p}</option>`;
});

}

function getFilteredRows(){

const rows=allData.slice(1);

const searchValue=document.getElementById("search").value.toLowerCase();

const selectedBulan=document.getElementById("filterBulan").value;
const selectedPenggilingan=document.getElementById("filterPenggilingan").value;

return rows.filter(row=>{

const bulan=getNamaBulan(row[0]);

const cocokBulan=!selectedBulan||bulan===selectedBulan;
const cocokPenggilingan=!selectedPenggilingan||row[1]===selectedPenggilingan;
const cocokSearch=row.join(" ").toLowerCase().includes(searchValue);

return cocokBulan&&cocokPenggilingan&&cocokSearch;

});

}

function sumUnique(rows,index){

const seen=new Set();
let total=0;

rows.forEach(r=>{
const val=Number(r[index])||0;
if(seen.has(val))return;
seen.add(val);
total+=val;
});

return total;

}

function renderTable(){

if(allData.length===0)return;

const header=allData[0];
const rows=getFilteredRows();

let html=`<div class="table-frame"><table><tr>${header.map(h=>`<th>${h}</th>`).join("")}<th>Aksi</th></tr>`;

rows.forEach((row,i)=>{
html+="<tr>";
row.forEach(cell=>html+=`<td>${cell}</td>`);
html+=`<td><button class="btn-danger" onclick="hapusData(${i+2})">Hapus</button></td></tr>`;
});

html+="</table></div>";

document.getElementById("data-container").innerHTML=html;

document.getElementById("data-count").innerHTML=
"Jumlah Data Ditampilkan : "+rows.length;

const totalGKP=sumUnique(rows,4);
const totalGKG=sumUnique(rows,8);
const totalBeras=sumUnique(rows,12);
const totalProduksi=sumUnique(rows,17);

const ton=n=>(n/1000).toFixed(2);

document.getElementById("total-container").innerHTML=

rows.length>0?

`Total Produksi Beras: ${ton(totalProduksi)} Ton | 
Total Stok GKP: ${ton(totalGKP)} Ton | 
Total Stok GKG: ${ton(totalGKG)} Ton | 
Total Stok Beras: ${ton(totalBeras)} Ton`

:"";

}

function printTable(){
window.print();
}

function downloadExcel(){

const rows=getFilteredRows();
const header=allData[0];

const data=[header,...rows];

const ws=XLSX.utils.aoa_to_sheet(data);

const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Laporan");

XLSX.writeFile(wb,"Laporan_Stok_Harga.xlsx");

}

/* DOWNLOAD PDF */

function downloadPDF(){

const { jsPDF } = window.jspdf;

const doc = new jsPDF('l','mm','legal');

const header = allData[0];
const rows = getFilteredRows();

doc.text("Laporan Stok & Harga Gabah Beras",14,15);

doc.autoTable({
head:[header],
body:rows,
startY:20,
styles:{fontSize:8},
theme:'grid'
});

doc.save("Laporan_Stok_Harga.pdf");

}

document.getElementById("filterBulan").addEventListener("change",renderTable);
document.getElementById("filterPenggilingan").addEventListener("change",renderTable);
document.getElementById("search").addEventListener("input",renderTable);

loadData();

</script>

</body>
</html>
