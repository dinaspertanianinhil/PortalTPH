<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laporan Peringatan Bahaya OPT</title>

<style>

body{
margin:0;
font-family:Segoe UI, Arial, sans-serif;
background-image:url('https://png.pngtree.com/thumb_back/fh260/background/20240705/pngtree-view-of-rice-fields-with-green-rice-with-dew-and-mountains-image_15860694.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(0,0,0,0.45);
min-height:100vh;
padding:40px 15px;
}

.container{
max-width:950px;
margin:auto;
background:rgba(255,255,255,0.96);
border-radius:12px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

.header{
display:flex;
align-items:center;
gap:20px;
border-bottom:2px solid #eee;
padding-bottom:15px;
margin-bottom:20px;
}

.logo{
width:70px;
}

.title h2{
margin:0;
font-size:20px;
}

.title h3{
margin:2px 0;
font-size:16px;
font-weight:600;
color:#444;
}

.title h1{
margin:5px 0;
font-size:22px;
letter-spacing:1px;
}

.badge{
margin-left:auto;
background:#c62828;
color:white;
padding:6px 12px;
border-radius:6px;
font-size:12px;
font-weight:bold;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:15px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
font-size:13px;
font-weight:600;
margin-bottom:4px;
}

input,select,textarea{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
resize:none;
}

.section{
margin-top:20px;
border-bottom:1px solid #ddd;
padding-bottom:5px;
font-weight:bold;
}

.footer{
margin-top:25px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#2e7d32;
border:none;
color:white;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

button:disabled{
background:#9e9e9e;
cursor:not-allowed;
}

.status{
margin-top:15px;
font-size:14px;
font-weight:600;
}

@media(max-width:700px){

.row{
grid-template-columns:1fr;
}

.header{
flex-direction:column;
align-items:flex-start;
}

.badge{
margin-left:0;
margin-top:10px;
}

}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<div class="header">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/a/a3/Logo_kabupaten_indragiri_hilir.jpg">

<div class="title">
<h2>Bidang Tanaman Pangan dan Hortikultura</h2>
<h3>Dinas Pertanian Kabupaten Indragiri Hilir</h3>
<h1>LAPORAN PERINGATAN BAHAYA</h1>
</div>

<div class="badge">PENTING</div>

</div>


<div class="row">

<div class="form-group">
<label>No Laporan</label>
<input id="nolaporan">
</div>

<div class="form-group">
<label>Laporan Ke</label>
<input id="laporanke">
</div>

</div>


<div class="section">Wilayah Pengamatan</div>

<div class="row">

<div class="form-group">
<label>Kabupaten / Kota</label>
<input id="kabupaten">
</div>

<div class="form-group">
<label>Kecamatan</label>
<input id="kecamatan">
</div>

<div class="form-group">
<label>Desa</label>
<input id="desa">
</div>

<div class="form-group">
<label>Tanggal Pengamatan</label>
<input type="date" id="tanggal">
</div>

</div>


<div class="section">Data Tanaman</div>

<div class="row">

<div class="form-group">
<label>Jenis Tanaman</label>
<input id="tanaman">
</div>

<div class="form-group">
<label>Varietas</label>
<input id="varietas">
</div>

<div class="form-group">
<label>Umur Tanaman</label>
<input id="umur">
</div>

<div class="form-group">
<label>Stadia / Phase</label>
<input id="stadia">
</div>

</div>


<div class="section">Data Serangan OPT</div>

<div class="row">

<div class="form-group">
<label>Jenis OPT</label>
<input id="opt">
</div>

<div class="form-group">
<label>Luas Tanaman Terserang (Ha)</label>
<input id="luas">
</div>

<div class="form-group">
<label>Intensitas Serangan (%)</label>
<input id="intensitas">
</div>

<div class="form-group">
<label>Padat Populasi</label>
<input id="populasi">
</div>

<div class="form-group">
<label>Keadaan Musuh Alami</label>
<input id="musuhalami">
</div>

<div class="form-group">
<label>Luas Tanaman Terancam (Ha)</label>
<input id="terancam">
</div>

</div>


<div class="section">Keterangan Tambahan</div>

<div class="form-group">
<label>Kemungkinan perluasan serangan / rekomendasi pengendalian</label>
<textarea rows="4" id="keterangan"></textarea>
</div>


<div class="footer">

<div class="form-group">
<label>Pengendali OPT / PHP</label>
<input id="petugas">
</div>

<button id="btnKirim" onclick="kirimData()">Simpan Laporan</button>

</div>

<div class="status" id="status"></div>

</div>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxd2EOl2PnQJ4jQcTMYrB5QgmPoMJdYjPjFADsH28y7LzFhJzKElvu7EbQY2MppiINicA/exec";

function kirimData(){

const btn = document.getElementById("btnKirim");
btn.disabled = true;

document.getElementById("status").innerHTML="⏳ Mengirim laporan...";

let data = {

nolaporan:document.getElementById("nolaporan").value,
laporanke:document.getElementById("laporanke").value,
kabupaten:document.getElementById("kabupaten").value,
kecamatan:document.getElementById("kecamatan").value,
desa:document.getElementById("desa").value,
tanggal:document.getElementById("tanggal").value,
tanaman:document.getElementById("tanaman").value,
varietas:document.getElementById("varietas").value,
umur:document.getElementById("umur").value,
stadia:document.getElementById("stadia").value,
opt:document.getElementById("opt").value,
luas:document.getElementById("luas").value,
intensitas:document.getElementById("intensitas").value,
populasi:document.getElementById("populasi").value,
musuhalami:document.getElementById("musuhalami").value,
terancam:document.getElementById("terancam").value,
keterangan:document.getElementById("keterangan").value,
petugas:document.getElementById("petugas").value

};

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(res=>{

document.getElementById("status").innerHTML="✅ Laporan berhasil dikirim";

setTimeout(function(){
location.reload();
},1500);

})
.catch(err=>{

document.getElementById("status").innerHTML="❌ Gagal mengirim laporan";
btn.disabled=false;

});

}

</script>

</body>
</html>
