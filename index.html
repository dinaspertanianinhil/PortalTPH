<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Sistem Laporan Dinas</title>
  <link rel="icon" href="Logo-TPH.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-primary: #1db972;
      --green-dark: #0f7a4a;
      --green-glow: rgba(29, 185, 114, 0.3);
      --green-soft: rgba(29, 185, 114, 0.12);
      --blue-primary: #2e7cf6;
      --blue-dark: #1a5fd4;
      --blue-glow: rgba(46, 124, 246, 0.3);
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --input-bg: rgba(255, 255, 255, 0.08);
      --input-border: rgba(255, 255, 255, 0.18);
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.7);
      --text-muted: rgba(255,255,255,0.42);
      --shadow-card: 0 32px 72px rgba(0,0,0,0.45), 0 8px 28px rgba(0,0,0,0.35);
      --shadow-btn: 0 8px 24px rgba(0,0,0,0.25);
      --radius-card: 26px;
      --radius-input: 13px;
      --radius-btn: 13px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      background:
        linear-gradient(
          150deg,
          rgba(0,0,0,0.72) 0%,
          rgba(4,35,18,0.60) 45%,
          rgba(0,0,0,0.78) 100%
        ),
        url("https://assets.promediateknologi.id/crop/0x0:0x0/0x0/webp/photo/p3/155/2025/04/10/Screen-Shot-2025-04-10-at-224530-3222523999.png")
        no-repeat center / cover fixed;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* Vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ===== HEADER ===== */
    header {
      position: relative;
      z-index: 10;
      background: rgba(3, 14, 8, 0.52);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      padding: 20px 24px;
      text-align: center;
      animation: slideDown 0.65s cubic-bezier(0.4,0,0.2,1) both;
    }

    .header-inner {
      max-width: 700px;
      margin: 0 auto;
    }

    .header-logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .header-emblem {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--green-primary), #0a6e3a);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 18px var(--green-glow);
      flex-shrink: 0;
    }

    .header-title-block {
      text-align: left;
    }

    .header-title-top {
      font-size: 0.78em;
      font-weight: 700;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .header-title-bot {
      font-size: 0.72em;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      margin-top: 1px;
    }

    header small {
      display: block;
      font-size: 0.72em;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* ===== MAIN ===== */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 44px 16px;
      position: relative;
      z-index: 1;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      padding: 48px 40px 44px;
      border-radius: var(--radius-card);
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.09);
      animation: fadeUp 0.7s cubic-bezier(0.4,0,0.2,1) 0.12s both;
      position: relative;
      overflow: hidden;
    }

    /* Top accent */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 18%;
      right: 18%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green-primary), transparent);
    }

    /* Ambient glow */
    .card::after {
      content: '';
      position: absolute;
      top: -70px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 130px;
      background: radial-gradient(ellipse, rgba(29,185,114,0.13) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Card icon */
    .card-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(29,185,114,0.18), rgba(29,185,114,0.07));
      border: 1px solid rgba(29,185,114,0.28);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 20px;
      box-shadow: 0 6px 20px rgba(29,185,114,0.18);
      animation: softPulse 3.5s ease-in-out infinite;
    }

    @keyframes softPulse {
      0%,100% { box-shadow: 0 6px 20px rgba(29,185,114,0.18); }
      50% { box-shadow: 0 6px 28px rgba(29,185,114,0.36); }
    }

    h2 {
      font-size: 1.45em;
      margin-bottom: 7px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    p {
      font-size: 0.87em;
      margin-bottom: 28px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ===== INPUTS ===== */
    .inputBox {
      margin-bottom: 13px;
      position: relative;
    }

    .icon {
      position: absolute;
      top: 50%;
      left: 13px;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.75;
    }

    input {
      width: 100%;
      padding: 13px 16px 13px 42px;
      border-radius: var(--radius-input);
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-primary);
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: var(--transition);
      caret-color: var(--green-primary);
    }

    input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
    }

    input:hover {
      border-color: rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.11);
    }

    input:focus {
      border-color: rgba(29,185,114,0.7);
      background: rgba(29,185,114,0.06);
      box-shadow: 0 0 0 3px rgba(29,185,114,0.14), 0 4px 16px rgba(0,0,0,0.2);
    }

    /* ===== BUTTONS ===== */
    button {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--green-dark) 0%, #17a35c 50%, var(--green-primary) 100%);
      color: #fff;
      border: 1px solid rgba(29,185,114,0.35);
      border-radius: var(--radius-btn);
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-btn), 0 2px 10px var(--green-glow);
      position: relative;
      overflow: hidden;
      margin-top: 10px;
      letter-spacing: 0.2px;
    }

    /* Shimmer sweep */
    button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
      transition: left 0.5s ease;
    }

    button:hover::before { left: 145%; }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.32), 0 4px 16px var(--green-glow);
      border-color: rgba(29,185,114,0.55);
    }

    button:active {
      transform: translateY(-1px);
      transition: all 0.08s;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .guestBtn {
      background: linear-gradient(135deg, #1450b0 0%, #1e6ae0 50%, var(--blue-primary) 100%);
      border-color: rgba(46,124,246,0.35);
      box-shadow: var(--shadow-btn), 0 2px 10px var(--blue-glow);
      margin-top: 9px;
    }

    .guestBtn:hover {
      box-shadow: 0 16px 36px rgba(0,0,0,0.32), 0 4px 16px var(--blue-glow);
      border-color: rgba(46,124,246,0.55);
    }

    /* Divider */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0 0;
      opacity: 0.45;
    }
    .or-line { flex: 1; height: 1px; background: rgba(255,255,255,0.2); }
    .or-text { font-size: 0.68em; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }

    /* ===== ERROR ===== */
    .error {
      margin-top: 14px;
      font-size: 0.84em;
      min-height: 22px;
      color: #ff8080;
      font-weight: 500;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .error:not(:empty)::before {
      content: '⚠';
      font-size: 13px;
    }

    /* ===== FOOTER ===== */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: 0.76em;
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.32);
      border-top: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: var(--text-muted);
      letter-spacing: 0.2px;
      font-weight: 400;
    }

    footer strong {
      color: var(--green-primary);
      font-weight: 600;
    }

    /* ===== AUDIO INDICATOR ===== */
    .audio-pill {
      position: fixed;
      bottom: 56px;
      right: 16px;
      z-index: 200;
      background: rgba(3, 14, 8, 0.72);
      border: 1px solid rgba(29,185,114,0.28);
      backdrop-filter: blur(14px);
      border-radius: 40px;
      padding: 7px 13px;
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 18px rgba(0,0,0,0.3);
    }

    .audio-pill:hover {
      background: rgba(3, 14, 8, 0.9);
      border-color: rgba(29,185,114,0.48);
    }

    .audio-bars { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
    .ab { width: 3px; background: var(--green-primary); border-radius: 2px; animation: ab 1.3s ease-in-out infinite; }
    .ab:nth-child(1){animation-delay:0s;height:5px}
    .ab:nth-child(2){animation-delay:.2s;height:11px}
    .ab:nth-child(3){animation-delay:.4s;height:7px}
    .ab:nth-child(4){animation-delay:.1s;height:13px}
    .ab:nth-child(5){animation-delay:.3s;height:5px}

    @keyframes ab {
      0%,100%{transform:scaleY(.35);opacity:.45}
      50%{transform:scaleY(1.2);opacity:1}
    }

    .audio-pill.paused .ab { animation: none; transform: scaleY(.35); opacity:.35; }
    .audio-pill-label { font-family:"Plus Jakarta Sans",sans-serif; font-size:.68em; font-weight:600; color:var(--text-secondary); letter-spacing:.5px; }

    /* ===== ANIMATIONS ===== */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Stagger inputs & buttons */
    .inputBox:nth-child(1) { animation: fadeUp 0.45s ease 0.38s both; }
    .inputBox:nth-child(2) { animation: fadeUp 0.45s ease 0.48s both; }
    #btnLogin { animation: fadeUp 0.45s ease 0.56s both; }
    .guestBtn { animation: fadeUp 0.45s ease 0.64s both; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      header { padding: 16px; }

      .header-logo-row { gap: 10px; }
      .header-emblem { width: 36px; height: 36px; font-size: 17px; }
      .header-title-top { font-size: 0.70em; }
      .header-title-bot { font-size: 0.65em; }

      main { padding: 32px 12px; }

      .card {
        padding: 36px 22px 32px;
        border-radius: 20px;
      }

      h2 { font-size: 1.25em; }

      input, button {
        font-size: 13px;
      }

      .audio-pill { bottom: 50px; right: 12px; }
    }

    @media (max-width: 360px) {
      .header-emblem { display: none; }
      .header-title-block { text-align: center; }
      .card { padding: 28px 16px 26px; }
    }
  </style>
</head>

<body>

<!-- Audio -->
<audio id="bgAudio" preload="auto">
  <source src="https://raw.githubusercontent.com/dinaspertanianinhil/PortalTPH/refs/heads/main/ElevenLabs_2026-04-09T08_28_50_Kanna%20-%20Warm%2C%20Calm%20and%20Clear_pvc_sp100_s50_sb75_se0_b_m2.mp3" type="audio/mpeg">
</audio>

<!-- Audio indicator -->
<div class="audio-pill paused" id="audioPill" title="Play / Pause audio">
  <div class="audio-bars">
    <div class="ab"></div><div class="ab"></div><div class="ab"></div>
    <div class="ab"></div><div class="ab"></div>
  </div>
  <span class="audio-pill-label">AUDIO</span>
</div>

<header>
  <div class="header-inner">
    <div class="header-logo-row">
      <div class="header-emblem">🌾</div>
      <div class="header-title-block">
        <div class="header-title-top">Bidang Tanaman Pangan dan Hortikultura</div>
        <div class="header-title-bot">Dinas Pertanian Kabupaten Indragiri Hilir</div>
      </div>
    </div>
    <small>Sistem Laporan Stok • Produksi • Harga Gabah & Beras</small>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-icon">🔐</div>
    <h2>Login Sistem</h2>
    <p>Masukkan username dan password Anda</p>

    <div class="inputBox">
      <span class="icon">👤</span>
      <input type="text" id="username" placeholder="Username" autocomplete="username">
    </div>

    <div class="inputBox">
      <span class="icon">🔑</span>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    </div>

    <button id="btnLogin" onclick="login()">Masuk</button>

    <div class="or-divider">
      <div class="or-line"></div>
      <span class="or-text">atau</span>
      <div class="or-line"></div>
    </div>

    <button class="guestBtn" onclick="guestLogin()">👁 Masuk sebagai Tamu</button>

    <div class="error" id="errorMsg"></div>
  </div>
</main>

<footer>
  © 2025 <strong>Dinas Pertanian</strong> – Kabupaten Indragiri Hilir
</footer>

<script>
const API_LOGIN = "https://script.google.com/macros/s/AKfycbxx7xTTXYdKMHyarBoj3638vcVhzRfN002q__ey-_QH-QRn1ZiJO95UdFts_O22a0dSnw/exec";

function login() {
  const btn = document.getElementById("btnLogin");
  const msg = document.getElementById("errorMsg");

  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!user || !pass) {
    msg.textContent = "Harap isi username dan password.";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Memproses...";
  msg.textContent = "";

  fetch(API_LOGIN, {
    method: "POST",
    body: JSON.stringify({
      username: user,
      password: pass
    })
  })
  .then(res => res.json())
  .then(res => {

    if (res.status === "ok") {

      // simpan session
      localStorage.setItem("loginUser", user);
      localStorage.setItem("role", res.role);
      localStorage.setItem("token", res.token);

      // redirect
      if (res.role === "admin" || res.role === "kadis") {
        window.location.href = "dashboad.html";
      } else if (res.role === "sekre") {
        window.location.href = "dashboad.html";
      } else {
        window.location.href = "dashboard2.html";
      }

    } else {
      msg.textContent = "Username atau password salah.";
      btn.disabled = false;
      btn.innerText = "Masuk";
    }

  })
  .catch(() => {
    msg.textContent = "Koneksi ke server gagal!";
    btn.disabled = false;
    btn.innerText = "Masuk";
  });
}

function guestLogin() {
  localStorage.setItem("loginUser", "guest");
  window.location.href = "dashboard2.html";
}

// enter = login
document.addEventListener("keypress", e => {
  if (e.key === "Enter") login();
});

/* ===== AUDIO ===== */
const audio = document.getElementById('bgAudio');
const pill  = document.getElementById('audioPill');
let started = false;

audio.volume = 0.22;

audio.play().then(() => {
  started = true;
  pill.classList.remove('paused');
}).catch(() => {
  const unlock = () => {
    if (!started) {
      audio.play().then(() => {
        started = true;
        pill.classList.remove('paused');
      }).catch(() => {});
    }
    document.removeEventListener('click', unlock);
    document.removeEventListener('touchstart', unlock);
  };
  document.addEventListener('click', unlock);
  document.addEventListener('touchstart', unlock);
});

pill.addEventListener('click', e => {
  e.stopPropagation();
  if (audio.paused) {
    audio.play().then(() => { started = true; pill.classList.remove('paused'); });
  } else {
    audio.pause();
    pill.classList.add('paused');
  }
});
</script>

</body>
</html>
