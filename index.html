<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Sistem Laporan Dinas</title>
  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}

    body {
      background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)),
      url("https://assets.promediateknologi.id/crop/0x0:0x0/0x0/webp/photo/p3/155/2025/04/10/Screen-Shot-2025-04-10-at-224530-3222523999.png")
      no-repeat center/cover;
      display:flex;flex-direction:column;min-height:100vh;color:#fff;
    }

    header {
      background:rgba(0,0,0,0.45);
      padding:20px 10px;
      text-align:center;
      font-size:1.15em;
      font-weight:700;
      backdrop-filter:blur(6px);
    }

    header small {
      display:block;
      font-size:0.82em;
      opacity:0.9;
      margin-top:3px;
    }

    main {
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 15px;
    }

    .card {
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.3);
      backdrop-filter:blur(10px);
      padding:45px 40px;
      border-radius:22px;
      width:100%;
      max-width:380px;
      text-align:center;
    }

    h2 {font-size:1.5em;margin-bottom:12px;}
    p {font-size:0.95em;margin-bottom:25px;}

    .inputBox {margin-bottom:14px;position:relative;}

    input {
      width:100%;
      padding:12px 14px 12px 40px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.35);
      background:rgba(255,255,255,0.18);
      color:#fff;
      outline:none;
    }

    input:focus {
      border-color:#93ffc8;
      box-shadow:0 0 6px rgba(147,255,200,0.5);
    }

    .icon {
      position:absolute;
      top:50%;
      left:12px;
      transform:translateY(-50%);
    }

    button {
      width:100%;
      padding:13px;
      background:#1c8a58;
      color:#fff;
      border:none;
      border-radius:10px;
      font-weight:600;
      cursor:pointer;
      margin-top:10px;
    }

    .guestBtn {background:#2873e1;margin-top:8px;}

    .error {
      margin-top:12px;
      font-size:0.9em;
      min-height:20px;
      color:#ffb9b9;
    }

    footer {
      text-align:center;
      font-size:0.8em;
      padding:10px;
      background:rgba(0,0,0,0.55);
    }
  </style>
</head>

<body>

<header>
  BIDANG TANAMAN TANAMAN PANGAN DAN HORTIKULTURA<br>
  DINAS PERTANIAN KABUPATEN INDRAGIRI HILIR
  <small>Sistem Laporan Stok • Produksi • Harga Gabah & Beras</small>
</header>

<main>
  <div class="card">
    <h2>🔐 Login Sistem</h2>
    <p>Masukkan username dan password Anda</p>

    <div class="inputBox">
      <span class="icon">👤</span>
      <input type="text" id="username" placeholder="Username">
    </div>

    <div class="inputBox">
      <span class="icon">🔑</span>
      <input type="password" id="password" placeholder="Password">
    </div>

    <button id="btnLogin" onclick="login()">Masuk</button>
    <button class="guestBtn" onclick="guestLogin()">Masuk sebagai Tamu</button>

    <div class="error" id="errorMsg"></div>
  </div>
</main>

<footer>
  © 2025 Dinas Pertanian – Kabupaten Indragiri Hilir
</footer>

<script>
const API_LOGIN = "https://script.google.com/macros/s/AKfycbxx7xTTXYdKMHyarBoj3638vcVhzRfN002q__ey-_QH-QRn1ZiJO95UdFts_O22a0dSnw/exec";

function login() {
  const btn = document.getElementById("btnLogin");
  const msg = document.getElementById("errorMsg");

  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!user || !pass) {
    msg.textContent = "Harap isi username dan password.";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Memproses...";
  msg.textContent = "";

  fetch(API_LOGIN, {
    method: "POST",
    body: JSON.stringify({
      username: user,
      password: pass
    })
  })
  .then(res => res.json())
  .then(res => {

    if (res.status === "ok") {

      // simpan session
      localStorage.setItem("loginUser", user);
      localStorage.setItem("role", res.role);
      localStorage.setItem("token", res.token);

      // redirect
      if (res.role === "admin" || res.role === "kadis") {
        window.location.href = "dashboad.html";
      } else if (res.role === "sekre") {
        window.location.href = "dashboad.html";
      } else {
        window.location.href = "dashboard2.html";
      }

    } else {
      msg.textContent = "Username atau password salah.";
      btn.disabled = false;
      btn.innerText = "Masuk";
    }

  })
  .catch(() => {
    msg.textContent = "Koneksi ke server gagal!";
    btn.disabled = false;
    btn.innerText = "Masuk";
  });
}

function guestLogin() {
  localStorage.setItem("loginUser", "guest");
  window.location.href = "dashboard2.html";
}

// enter = login
document.addEventListener("keypress", e => {
  if (e.key === "Enter") login();
});
</script>

</body>
</html>
