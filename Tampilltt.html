<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard LTT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Segoe UI, Arial;
margin:0;
background:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTvxh4_NzxPObs3auPYoJIUojZJvrn6v1Akhw&s');
background-size:cover;
}

.overlay{
background:rgba(255,255,255,0.95);
min-height:100vh;
}

/* HEADER PUTIH */
.header{
background:white;
color:#1b5e20;
text-align:center;
padding:25px;
border-bottom:4px solid #2e7d32;
}

.header img{
width:70px;
display:block;
margin:auto;
margin-bottom:10px;
}

/* MENU HIJAU */
.menu{
background:#2e7d32;
display:flex;
flex-wrap:wrap;
}

.menu button{
background:none;
border:none;
color:white;
padding:14px 18px;
cursor:pointer;
font-size:14px;
}

.menu button:hover{
background:#1b5e20;
}

.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
background:white;
min-width:220px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:10;
}

.dropdown-content a{
display:block;
padding:10px;
text-decoration:none;
color:black;
cursor:pointer;
}

.dropdown-content a:hover{
background:#e8f5e9;
}

.dropdown:hover .dropdown-content{
display:block;
}

.container{
width:95%;
margin:auto;
padding:20px;
}

.card-area{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
border-top:4px solid #43a047;
}

.table-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border:1px solid #ddd;
font-size:13px;
}

th{
background:#2e7d32;
color:white;
}

/* DOWNLOAD DROPDOWN */
.download-group{
position:relative;
display:inline-block;
margin-bottom:10px;
}

.download-btn{
background:#43a047;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.download-menu{
display:none;
position:absolute;
background:white;
min-width:150px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:5;
}

.download-menu a{
display:block;
padding:8px 10px;
cursor:pointer;
}

.download-menu a:hover{
background:#e8f5e9;
}

.download-group:hover .download-menu{
display:block;
}

</style>
</head>

<body>

<div class="overlay">

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a3/Logo_kabupaten_indragiri_hilir.jpg">
<h2>Bidang Tanaman Pangan dan Hortikultura</h2>
<small>Dinas Pertanian Kabupaten Indragiri Hilir</small>
</div>

<div class="menu">

<div class="dropdown">
<button>Rekap Harian ▾</button>
<div class="dropdown-content">
<a onclick="loadData('harian_kabupaten')">Rekap Kabupaten</a>
<a onclick="loadData('harian_kecamatan')">Rekap Kecamatan</a>
<a onclick="loadData('harian_desa')">Rekap Desa</a>
</div>
</div>

<div class="dropdown">
<button>Rekap Jenis LTT ▾</button>
<div class="dropdown-content">
<a onclick="loadData('jenis_kabupaten')">Rekap Kabupaten</a>
<a onclick="loadData('jenis_kecamatan')">Rekap Kecamatan</a>
<a onclick="loadData('jenis_desa')">Rekap Desa</a>
</div>
</div>

<div class="dropdown">
<button>Rekap Bulanan ▾</button>
<div class="dropdown-content">
<a onclick="loadData('bulanan_kabupaten')">Rekap Kabupaten</a>
<a onclick="loadData('bulanan_kecamatan')">Rekap Kecamatan</a>
<a onclick="loadData('bulanan_desa')">Rekap Desa</a>
</div>
</div>

<button onclick="loadData('musiman')">Rekap Musiman</button>

</div>

<div class="container">

<div class="card-area">

<div class="card">
Total LTT
<h2 id="ltt">0</h2>
</div>

<div class="card">
Oplah
<h2 id="oplah">0</h2>
</div>

<div class="card">
Reguler
<h2 id="reguler">0</h2>
</div>

<div class="card">
Jagung
<h2 id="jagung">0</h2>
</div>

</div>

<div class="table-box">

<div class="download-group">
<button class="download-btn">Download ▾</button>
<div class="download-menu">
<a onclick="downloadExcel()">Excel</a>
<a onclick="downloadPDF()">PDF</a>
</div>
</div>

<table id="tabelData">
<thead></thead>
<tbody></tbody>
</table>

</div>

</div>

</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbzzHUitpqsg-v_1-PtKuLL8kw4mAxmGqztE1LD7T_OcELVTjqLG-G__puXGqssaUB6A/exec";

let masterData = {};
let currentData = [];

fetch(url)
.then(r => r.json())
.then(data => {

masterData = data;

document.getElementById("ltt").innerText = data.total_kabupaten || 0;
document.getElementById("oplah").innerText = data.jenis_total?.oplah || 0;
document.getElementById("reguler").innerText = data.jenis_total?.reguler || 0;
document.getElementById("jagung").innerText = data.jenis_total?.jagung || 0;

});

function today(){
return new Date().toISOString().split("T")[0];
}

function loadData(mode){

let data = [];

if(mode === "harian_kabupaten"){
for(let kec in masterData.jenis_per_kecamatan){
let j = masterData.jenis_per_kecamatan[kec];
let reg = j.reguler || 0;
let opl = j.oplah || 0;
let jag = j.jagung || 0;
data.push({
Tanggal: today(),
Kecamatan:kec,
Reguler:reg,
Oplah:opl,
Jagung:jag,
Total_Padi: reg + opl,
Total_LTT: reg + opl + jag
});
}
}

if(mode === "harian_kecamatan"){
for(let desa in masterData.jenis_per_desa){
let j = masterData.jenis_per_desa[desa];
let reg = j.reguler || 0;
let opl = j.oplah || 0;
let jag = j.jagung || 0;
data.push({
Tanggal: today(),
Kecamatan:j.kecamatan || "-",
Desa:desa,
Reguler:reg,
Oplah:opl,
Jagung:jag,
Total_Padi: reg + opl,
Total_LTT: reg + opl + jag
});
}
}

if(mode === "harian_desa"){
for(let desa in masterData.jenis_per_desa){
let j = masterData.jenis_per_desa[desa];
let reg = j.reguler || 0;
let opl = j.oplah || 0;
let jag = j.jagung || 0;
data.push({
Tanggal: today(),
Desa:desa,
Reguler:reg,
Oplah:opl,
Jagung:jag,
Total_Padi: reg + opl,
Total_LTT: reg + opl + jag
});
}
}

if(mode === "jenis_kabupaten"){
let reg = masterData.jenis_total.reguler || 0;
let opl = masterData.jenis_total.oplah || 0;
let jag = masterData.jenis_total.jagung || 0;
data.push({
Tanggal: today(),
Reguler:reg,
Oplah:opl,
Jagung:jag,
Total_Padi: reg + opl,
Total_LTT: reg + opl + jag
});
}

if(mode === "jenis_kecamatan"){
for(let kec in masterData.jenis_per_kecamatan){
let j = masterData.jenis_per_kecamatan[kec];
let reg = j.reguler || 0;
let opl = j.oplah || 0;
let jag = j.jagung || 0;
data.push({
Tanggal: today(),
Kecamatan:kec,
Reguler:reg,
Oplah:opl,
Jagung:jag,
Total_Padi: reg + opl,
Total_LTT: reg + opl + jag
});
}
}

if(mode === "jenis_desa"){
for(let desa in masterData.jenis_per_desa){
let j = masterData.jenis_per_desa[desa];
let reg = j.reguler || 0;
let opl = j.oplah || 0;
let jag = j.jagung || 0;
data.push({
Tanggal: today(),
Desa:desa,
Reguler:reg,
Oplah:opl,
Jagung:jag,
Total_Padi: reg + opl,
Total_LTT: reg + opl + jag
});
}
}

if(mode === "bulanan_kabupaten"){
let reg = masterData.jenis_total.reguler || 0;
let opl = masterData.jenis_total.oplah || 0;
let jag = masterData.jenis_total.jagung || 0;
data.push({
Bulan:"Bulan Ini",
Reguler:reg,
Oplah:opl,
Jagung:jag,
Total_Padi: reg + opl,
Total_LTT: reg + opl + jag
});
}

if(mode === "bulanan_kecamatan"){
for(let kec in masterData.jenis_per_kecamatan){
let j = masterData.jenis_per_kecamatan[kec];
let reg = j.reguler || 0;
let opl = j.oplah || 0;
let jag = j.jagung || 0;
data.push({
Bulan:"Bulan Ini",
Kecamatan:kec,
Reguler:reg,
Oplah:opl,
Jagung:jag,
Total_Padi: reg + opl,
Total_LTT: reg + opl + jag
});
}
}

if(mode === "bulanan_desa"){
for(let desa in masterData.jenis_per_desa){
let j = masterData.jenis_per_desa[desa];
let reg = j.reguler || 0;
let opl = j.oplah || 0;
let jag = j.jagung || 0;
data.push({
Bulan:"Bulan Ini",
Desa:desa,
Reguler:reg,
Oplah:opl,
Jagung:jag,
Total_Padi: reg + opl,
Total_LTT: reg + opl + jag
});
}
}

if(mode === "musiman"){
for(let desa in masterData.jenis_per_desa){
let j = masterData.jenis_per_desa[desa];
let reg = j.reguler || 0;
let opl = j.oplah || 0;
let jag = j.jagung || 0;
let total = reg + opl + jag;
data.push({
Tahun:2026,
Musim_Tanam:"MT1",
Kecamatan:j.kecamatan || "-",
Desa:desa,
Reguler:reg,
Oplah:opl,
Jagung:jag,
Total_Padi: reg + opl,
Total_LTT: total,
Target_Musim:500,
Realisasi:total,
Persentase:((total/500)*100).toFixed(1)+"%"
});
}
}

currentData = data;
renderTable(data);

}

function renderTable(data){

const head = document.querySelector("#tabelData thead");
const body = document.querySelector("#tabelData tbody");

head.innerHTML="";
body.innerHTML="";

if(data.length === 0) return;

let columns = Object.keys(data[0]);

let tr = "<tr>";
columns.forEach(c => tr += `<th>${c}</th>`);
tr += "</tr>";
head.innerHTML = tr;

data.forEach(row=>{
let tr = "<tr>";
columns.forEach(c => tr += `<td>${row[c]}</td>`);
tr += "</tr>";
body.innerHTML += tr;
});

}

function downloadExcel(){

let csv = "";
let columns = Object.keys(currentData[0] || {});
csv += columns.join(",") + "\n";

currentData.forEach(row=>{
csv += columns.map(c=>row[c]).join(",") + "\n";
});

let blob = new Blob([csv], {type:"text/csv"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "rekap_ltt.xlsx";
a.click();

}

function downloadPDF(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let columns = Object.keys(currentData[0] || {});
let y = 20;

doc.setFontSize(14);
doc.text("Rekap LTT", 14, 10);

doc.setFontSize(9);

doc.text(columns.join(" | "), 14, y);
y += 6;

currentData.forEach(row=>{
let line = columns.map(c=>row[c]).join(" | ");
doc.text(line, 14, y);
y += 6;
if(y > 280){
doc.addPage();
y = 20;
}
});

doc.save("rekap_ltt.pdf");

}

</script>

</body>
</html>
