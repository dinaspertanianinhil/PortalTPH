<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard LTT - Maintenance</title>

<style>

body{
margin:0;
font-family:Segoe UI, Arial, sans-serif;
background:url("https://png.pngtree.com/thumb_back/fh260/background/20240705/pngtree-view-of-rice-fields-with-green-rice-with-dew-and-mountains-image_15860694.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(255,255,255,0.75);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:40px;
border-radius:12px;
max-width:600px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.logo{
width:80px;
margin-bottom:15px;
}

h1{
color:#1b5e20;
margin-bottom:10px;
}

h3{
margin-top:0;
color:#2e7d32;
font-weight:normal;
}

.message{
margin-top:20px;
font-size:16px;
color:#444;
line-height:1.6;
}

.footer{
margin-top:25px;
font-size:13px;
color:#777;
}

.loader{
margin:25px auto;
border:6px solid #e0e0e0;
border-top:6px solid #2e7d32;
border-radius:50%;
width:45px;
height:45px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="overlay">

<div class="box">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/a/a3/Logo_kabupaten_indragiri_hilir.jpg">

<h1>Dashboard LTT</h1>
<h3>Dinas Pertanian Kabupaten Indragiri Hilir</h3>

<div class="loader"></div>

<div class="message">
Dashboard saat ini sedang dalam proses <b>maintenance dan perbaikan sistem</b>.<br><br>
Kami sedang melakukan pembaruan agar sistem dapat berjalan lebih stabil dan akurat.
Silakan kembali lagi nanti.
</div>

<div class="footer">
Terima kasih atas pengertiannya.
</div>

</div>

</div>

</body>
</html>
