<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard LTT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background-image:url('https://png.pngtree.com/thumb_back/fh260/background/20240705/pngtree-view-of-rice-fields-with-green-rice-with-dew-and-mountains-image_15860694.jpg');
background-size:cover;
background-attachment:fixed;
}

.overlay{
background:rgba(255,255,255,0.92);
min-height:100vh;
}

header{
display:flex;
align-items:center;
gap:15px;
padding:15px 25px;
background:#1b5e20;
color:white;
}

header img{
width:55px;
}

header h1{
font-size:18px;
margin:0;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.card h3{
margin:0;
font-size:13px;
color:#666;
}

.card p{
font-size:26px;
margin:5px 0;
font-weight:bold;
}

.filter{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

button{
padding:8px 12px;
border:none;
background:#2e7d32;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th{
background:#2e7d32;
color:white;
padding:8px;
font-size:13px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px;
}

tr:hover{
background:#f1f8e9;
}

.chartbox{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.rankbox{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="overlay">

<header>
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a3/Logo_kabupaten_indragiri_hilir.jpg">
<h1>
Bidang Tanaman Pangan dan Hortikultura<br>
Dinas Pertanian Kabupaten Indragiri Hilir
</h1>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total LTT</h3>
<p id="totalLtt">0</p>
</div>

<div class="card">
<h3>LTT Hari Ini</h3>
<p id="todayLtt">0</p>
</div>

<div class="card">
<h3>Jumlah Kecamatan</h3>
<p id="totalKec">0</p>
</div>

<div class="card">
<h3>Jumlah Laporan</h3>
<p id="totalData">0</p>
</div>

</div>

<div class="filter">

<select id="filterKecamatan">
<option value="">Semua Kecamatan</option>
</select>

<input type="date" id="filterTanggal">

<button onclick="downloadExcel()">Download Excel</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div class="chartbox">
<canvas id="chartKecamatan"></canvas>
</div>

<div class="rankbox">
<h3>Ranking Kecamatan</h3>
<ol id="ranking"></ol>
</div>

<table id="tableData">

<thead>
<tr>
<th>Tanggal</th>
<th>Kecamatan</th>
<th>Desa</th>
<th>Poktan</th>
<th>Jenis</th>
<th>Luas</th>
<th>Pelapor</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwrYoh1hTY-B1qBbVwQc3t2aYHddbizvXSw4DCQUXxG5pN9U7aD6cEnNYJav-Q02b4e/exec";

let rawData=[];
let chart;

function formatDate(date){

if(!date) return "";

return date.toString().slice(0,10);

}

async function loadData(){

const res=await fetch(API_URL);
rawData=await res.json();

rawData.forEach(d=>{
d.TANGGAL=formatDate(d.TANGGAL);
});

initFilter();
render();

}

function initFilter(){

let kecSet=new Set();

rawData.forEach(d=>{
kecSet.add(d.KECAMATAN);
});

let select=document.getElementById("filterKecamatan");

kecSet.forEach(k=>{
select.innerHTML+=`<option>${k}</option>`;
});

select.onchange=render;
document.getElementById("filterTanggal").onchange=render;

}

function render(){

let kecFilter=document.getElementById("filterKecamatan").value;
let tglFilter=document.getElementById("filterTanggal").value;

let data=rawData.filter(d=>{

let cocok=true;

if(kecFilter && d.KECAMATAN!=kecFilter) cocok=false;
if(tglFilter && d.TANGGAL!=tglFilter) cocok=false;

return cocok;

});

let total=0;
let today=0;
let kecMap={};

let tbody=document.querySelector("#tableData tbody");
tbody.innerHTML="";

let todayStr=new Date().toLocaleDateString("sv-SE");

data.forEach(d=>{

let luas=parseFloat(d["LUAS TAMBAH TANAM"])||0;

total+=luas;

if(d.TANGGAL==todayStr) today+=luas;

kecMap[d.KECAMATAN]=(kecMap[d.KECAMATAN]||0)+luas;

tbody.innerHTML+=`
<tr>
<td>${d.TANGGAL}</td>
<td>${d.KECAMATAN}</td>
<td>${d.DESA}</td>
<td>${d["KELOMPOK TANI"]}</td>
<td>${d["JENIS LTT"]}</td>
<td>${luas}</td>
<td>${d["NAMA PELAPOR"]}</td>
</tr>
`;

});

document.getElementById("totalLtt").innerText=total+" Ha";
document.getElementById("todayLtt").innerText=today+" Ha";
document.getElementById("totalKec").innerText=Object.keys(kecMap).length;
document.getElementById("totalData").innerText=data.length;

renderChart(kecMap);
renderRanking(kecMap);

}

function renderChart(data){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chartKecamatan"),{

type:"bar",

data:{
labels:Object.keys(data),
datasets:[{
label:"LTT per Kecamatan",
data:Object.values(data)
}]
}

});

}

function renderRanking(data){

let sorted=Object.entries(data).sort((a,b)=>b[1]-a[1]);

let html="";

sorted.forEach(r=>{
html+=`<li>${r[0]} - ${r[1]} Ha</li>`;
});

document.getElementById("ranking").innerHTML=html;

}

function downloadExcel(){

let table=document.getElementById("tableData");
let wb=XLSX.utils.table_to_book(table);
XLSX.writeFile(wb,"LTT.xlsx");

}

function downloadPDF(){

const {jsPDF}=window.jspdf;

let doc=new jsPDF();

doc.text("Laporan LTT",10,10);

let rows=[...document.querySelectorAll("#tableData tr")];

let y=20;

rows.forEach(r=>{
doc.text(r.innerText,10,y);
y+=8;
});

doc.save("LTT.pdf");

}

loadData();

</script>

</body>
</html>
