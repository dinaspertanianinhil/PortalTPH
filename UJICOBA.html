<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form LTT Dinas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --primary:      #0d9488;
  --primary-dark: #0f766e;
  --primary-light:#ccfbf1;
  --primary-glow: rgba(13,148,136,.18);
  --accent:       #f59e0b;
  --danger:       #ef4444;
  --danger-dark:  #dc2626;
  --surface:      #ffffff;
  --surface-2:    #f8fafc;
  --border:       #e2e8f0;
  --border-focus: #0d9488;
  --text:         #0f172a;
  --text-muted:   #64748b;
  --text-light:   #94a3b8;
  --shadow-sm:    0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md:    0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
  --shadow-lg:    0 10px 32px rgba(0,0,0,.10), 0 4px 12px rgba(0,0,0,.06);
  --radius:       14px;
  --radius-sm:    9px;
  --transition:   all .22s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #eef6f5;
  background-image:
    radial-gradient(ellipse at 0% 0%, rgba(13,148,136,.12) 0%, transparent 55%),
    radial-gradient(ellipse at 100% 100%, rgba(13,148,136,.08) 0%, transparent 55%);
  min-height: 100vh;
  padding: 18px 14px 40px;
  color: var(--text);
}

/* ───── HEADER ───── */
.header {
  background: linear-gradient(135deg, #0f766e 0%, #0d9488 60%, #14b8a6 100%);
  padding: 20px 22px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
  box-shadow: 0 6px 24px rgba(13,148,136,.35), 0 2px 6px rgba(0,0,0,.08);
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,.08);
}

.header::after {
  content: '';
  position: absolute;
  bottom: -30px; left: 60px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(255,255,255,.06);
}

.header img {
  width: 50px;
  height: 50px;
  object-fit: contain;
  border-radius: 10px;
  background: rgba(255,255,255,.15);
  padding: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.header-text {
  position: relative;
  z-index: 1;
}

.header-text b {
  display: block;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 17px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -.2px;
}

.header-text small {
  font-size: 12px;
  color: rgba(255,255,255,.78);
  font-weight: 500;
  letter-spacing: .3px;
}

.header-badge {
  margin-left: auto;
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.22);
  border-radius: 20px;
  padding: 5px 11px;
  font-size: 11px;
  color: #fff;
  font-weight: 600;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ───── SECTION LABEL ───── */
.section-label {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: var(--primary-dark);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--primary-light), transparent);
}

/* ───── BOX / CARD ───── */
.box {
  background: var(--surface);
  padding: 20px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
  transition: var(--transition);
  animation: fadeUp .4s ease both;
}

.box:hover { box-shadow: var(--shadow-lg); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.box:nth-child(2) { animation-delay: .07s; }
.box:nth-child(3) { animation-delay: .14s; }
.box:nth-child(4) { animation-delay: .21s; }

/* ───── LABEL ───── */
label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-top: 14px;
  margin-bottom: 5px;
  display: block;
  letter-spacing: .2px;
}

/* ───── INPUT / SELECT ───── */
input, select {
  width: 100%;
  padding: 11px 13px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--surface-2);
  transition: var(--transition);
  appearance: none;
  -webkit-appearance: none;
  outline: none;
}

input:focus, select:focus {
  border-color: var(--border-focus);
  background: #fff;
  box-shadow: 0 0 0 3px var(--primary-glow);
}

input::placeholder { color: var(--text-light); }

/* Custom arrow for select */
.select-wrap {
  position: relative;
}

.select-wrap::after {
  content: '\f107';
  font-family: 'Font Awesome 6 Free';
  font-weight: 900;
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  font-size: 13px;
}

.select-wrap select { padding-right: 32px; cursor: pointer; }

/* ───── BUTTON BASE ───── */
button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 11px 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  width: 100%;
  letter-spacing: .1px;
}

/* Primary green button */
.btn-primary, button:not(.btn-hapus):not(.btn-poktan):not(.btn-save) {
  background: linear-gradient(135deg, #0f766e, #0d9488);
  color: #fff;
  box-shadow: 0 3px 10px rgba(13,148,136,.3);
}

.btn-primary:hover,
button:not(.btn-hapus):not(.btn-poktan):not(.btn-save):hover {
  background: linear-gradient(135deg, #115e59, #0f766e);
  box-shadow: 0 5px 18px rgba(13,148,136,.4);
  transform: translateY(-1px);
}

.btn-primary:active,
button:not(.btn-hapus):not(.btn-poktan):not(.btn-save):active {
  transform: translateY(0);
  box-shadow: 0 2px 6px rgba(13,148,136,.25);
}

/* Hapus button */
.btn-hapus {
  background: linear-gradient(135deg, #dc2626, #ef4444) !important;
  color: #fff !important;
  box-shadow: 0 2px 8px rgba(239,68,68,.25) !important;
  width: auto !important;
  padding: 8px 12px !important;
  font-size: 12px !important;
}

.btn-hapus:hover {
  background: linear-gradient(135deg, #b91c1c, #dc2626) !important;
  box-shadow: 0 4px 14px rgba(239,68,68,.35) !important;
  transform: translateY(-1px) !important;
}

/* Poktan button */
.btn-poktan {
  background: linear-gradient(135deg, #0369a1, #0284c7) !important;
  color: #fff !important;
  box-shadow: 0 2px 8px rgba(3,105,161,.25) !important;
  width: auto !important;
  padding: 8px 14px !important;
  font-size: 12px !important;
}

.btn-poktan:hover {
  background: linear-gradient(135deg, #075985, #0369a1) !important;
  box-shadow: 0 4px 14px rgba(3,105,161,.35) !important;
  transform: translateY(-1px) !important;
}

/* Save button */
.btn-save {
  background: linear-gradient(135deg, #0f766e, #0d9488, #14b8a6) !important;
  color: #fff !important;
  padding: 14px 20px !important;
  font-size: 15px !important;
  border-radius: var(--radius) !important;
  box-shadow: 0 5px 20px rgba(13,148,136,.4), 0 2px 6px rgba(0,0,0,.1) !important;
  letter-spacing: .2px;
  position: relative;
  overflow: hidden;
}

.btn-save::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, transparent 0%, rgba(255,255,255,.12) 50%, transparent 100%);
  transform: translateX(-100%);
  transition: transform .6s ease;
}

.btn-save:hover::before { transform: translateX(100%); }

.btn-save:hover {
  box-shadow: 0 8px 28px rgba(13,148,136,.5), 0 4px 10px rgba(0,0,0,.12) !important;
  transform: translateY(-2px);
}

.btn-save:disabled {
  background: linear-gradient(135deg, #94a3b8, #cbd5e1) !important;
  box-shadow: none !important;
  cursor: not-allowed;
  transform: none !important;
}

/* ───── DESA CARD ───── */
.desa {
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  padding: 16px;
  margin-top: 14px;
  border-radius: var(--radius);
  transition: var(--transition);
  animation: fadeUp .3s ease both;
}

.desa:hover { border-color: #a7f3d0; box-shadow: 0 3px 12px rgba(13,148,136,.1); }

.desa-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}

.desa-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary-dark);
  display: flex;
  align-items: center;
  gap: 6px;
  text-transform: uppercase;
  letter-spacing: .6px;
}

.desa-actions {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
}

/* ───── POKTAN ROW ───── */
.poktanContainer {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}

.poktan {
  display: grid;
  grid-template-columns: 1fr 90px 150px 75px 75px 1fr 42px;
  gap: 7px;
  background: #fff;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  align-items: center;
  transition: var(--transition);
  animation: fadeUp .25s ease both;
}

.poktan:hover { border-color: #99f6e4; box-shadow: 0 2px 10px rgba(13,148,136,.08); }

.poktan input, .poktan select {
  font-size: 13px;
  padding: 8px 10px;
  background: var(--surface-2);
}

.poktan .btn-hapus {
  width: 34px !important;
  height: 34px !important;
  padding: 0 !important;
  border-radius: 7px !important;
  font-size: 11px !important;
}

.poktan-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 2px;
  display: none;
}

/* ───── REKAP GRID ───── */
.rekap {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 4px;
}

.rekap div {
  background: linear-gradient(135deg, #f0fdf9, #ecfdf5);
  border: 1px solid #a7f3d0;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.rekap div:hover { border-color: var(--primary); transform: scale(1.02); }

.rekap div span {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--primary-dark);
  line-height: 1.1;
}

.rekap div .rekap-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .3px;
}

/* ───── EMPTY STATE ───── */
.empty-state {
  text-align: center;
  padding: 28px 16px;
  color: var(--text-light);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.empty-state i { font-size: 32px; color: #a7f3d0; }
.empty-state p { font-size: 13px; font-weight: 500; }

/* ───── INFO STRIP ───── */
.info-strip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 12px;
  color: #92400e;
  font-weight: 600;
  margin-bottom: 14px;
}

/* ───── MOBILE ───── */
@media (max-width: 640px) {
  body { padding: 12px 10px 36px; }

  .header { padding: 16px; }
  .header-badge { display: none; }

  .poktan {
    grid-template-columns: 1fr;
    gap: 6px;
    padding: 12px;
  }

  .poktan-label { display: block; }

  .poktan .btn-hapus {
    width: 100% !important;
    height: 38px !important;
    padding: 0 12px !important;
  }

  .rekap { grid-template-columns: repeat(2, 1fr); }

  .desa-actions { width: 100%; }
  .desa-actions button { flex: 1; }
}

@media (max-width: 380px) {
  .rekap { grid-template-columns: 1fr 1fr; }
}

/* ───── SCROLLBAR ───── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #99f6e4; border-radius: 10px; }
</style>
</head>

// isi desa
function isiDesa(select){
  let kec = document.getElementById("kecamatan").value;
  select.innerHTML = '<option value="">-- Pilih Desa/Kelurahan --</option>';

  if(dataWilayah[kec]){
    // tampilkan kelurahan dulu
    dataWilayah[kec].kelurahan.forEach(k=>{
      let o = document.createElement("option");
      o.value = "Kelurahan " + k;
      o.textContent = k + " (Kelurahan)";
      select.appendChild(o);
    });

    // lalu desa
    dataWilayah[kec].desa.forEach(d=>{
      let o = document.createElement("option");
      o.value = "Desa " + d;
      o.textContent = d + " (Desa)";
      select.appendChild(o);
    });
  }
}

kec.onchange = () => {
  document.querySelectorAll(".desaSelect").forEach(s => isiDesa(s));
};

// ===== helper: hapus empty state
function updateEmptyState(){
  const container = document.getElementById("desaContainer");
  const desaCards = container.querySelectorAll(".desa");
  let es = container.querySelector(".empty-state");
  if(desaCards.length === 0){
    if(!es){
      es = document.createElement("div");
      es.className = "empty-state";
      es.innerHTML = `<i class="fa-regular fa-folder-open"></i><p>Belum ada desa ditambahkan.<br>Klik tombol di bawah untuk mulai.</p>`;
      container.appendChild(es);
    }
  } else {
    if(es) es.remove();
  }
}

// tambah desa
let desaCounter = 0;
function tambahDesa(){
  desaCounter++;
  const container = document.getElementById("desaContainer");
  let es = container.querySelector(".empty-state");
  if(es) es.remove();

  let div = document.createElement("div");
  div.className = "desa";
  div.innerHTML = `
    <div class="desa-header">
      <span class="desa-title"><i class="fa-solid fa-map-pin"></i> Desa #${desaCounter}</span>
      <div class="desa-actions">
        <button class="btn-poktan" onclick="tambahPoktan(this)"><i class="fa-solid fa-plus"></i> Poktan</button>
        <button class="btn-hapus" onclick="this.closest('.desa').remove();hitung();updateEmptyState()"><i class="fa-solid fa-trash"></i> Hapus</button>
      </div>
    </div>
    <div class="select-wrap">
      <select class="desaSelect"></select>
    </div>
    <div class="poktanContainer"></div>
  `;
  container.appendChild(div);
  isiDesa(div.querySelector(".desaSelect"));
}

  let c = btn.closest('.desa').querySelector(".poktanContainer");

  let div = document.createElement("div");
  div.className = "poktan";
  div.innerHTML = `

// ================= REKAP
function hitung(){
  let total = {reguler:0,oplah:0,csr:0,pompa:0,das:0,tusip:0,gogo:0,jagung:0,jagung_polri:0,kedelai:0};

  document.querySelectorAll(".poktan").forEach(p=>{
    // desktop: children layout; mobile: wrapped in divs
    const inputs = p.querySelectorAll("input[type=number]");
    const selects = p.querySelectorAll("select");
    let luas = parseFloat(inputs[0]?.value) || 0;
    let jenis = selects[0]?.value;
    if(jenis && total[jenis] !== undefined) total[jenis] += luas;
  });

  for(let k in total){
    const el = document.getElementById(k);
    if(el) el.innerText = total[k] % 1 === 0 ? total[k] : total[k].toFixed(2);
  }
}

// ================= KIRIM
const SCRIPT_URL = "PASTE_URL_SCRIPT_KAMU";

function simpan(){
  if(!document.getElementById("pelapor").value){
    alert("Nama pelapor wajib diisi");
    return;
  }

  let rows = [];
  document.querySelectorAll(".desa").forEach(d=>{
    let desa = d.querySelector("select.desaSelect")?.value;

    d.querySelectorAll(".poktan").forEach(p=>{
      const inputs = p.querySelectorAll("input");
      const selects = p.querySelectorAll("select");
      let luas = inputs[1]?.value;
      if(luas){
        rows.push({
          desa: desa,
          poktan: inputs[0]?.value,
          luas: luas,
          jenis: selects[0]?.value,
          olah: inputs[2]?.value,
          panen: inputs[3]?.value,
          ket: inputs[4]?.value
        });
      }
    });
  });

  if(rows.length == 0){
    alert("Isi minimal 1 data");
    return;
  }

  const data = new URLSearchParams();
  data.append("pelapor", document.getElementById("pelapor").value);
  data.append("kecamatan", document.getElementById("kecamatan").value);
  data.append("tanggal", document.getElementById("tanggal").value);
  data.append("rows", JSON.stringify(rows));

  const btnSimpan = document.getElementById("btnSimpan");
  btnSimpan.disabled = true;
  btnSimpan.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Mengirim...`;

  fetch(SCRIPT_URL, {method:"POST", body:data})
  .then(r=>r.text())
  .then(r=>{
    if(r=="OK"){
      alert("✅ Berhasil disimpan");
      location.reload();
    } else {
      alert("❌ "+r);
      btnSimpan.disabled = false;
      btnSimpan.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> Simpan Data LTT`;
    }
  });
}
